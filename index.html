<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number 433 Elite - Ultimate Edition</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070912;
  --primary: #5c5ff5;
  --accent: #c9a84c;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-dim: #8489b2;
  --green: #4dff88;
  --red: #ff4d4d;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: white; font-family: 'Tajawal', sans-serif; min-height: 100vh; padding: 10px 15px 120px; direction: rtl; }

/* Header */
.cool-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
.logo-num433 { font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 800; color: white; }
.logo-num433 b { color: var(--primary); }
.user-status-card { display: flex; align-items: center; gap: 8px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50px; padding: 6px 12px; font-size: 12px; }
.online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

/* Task Cards */
.task-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
}
.task-icon { width: 45px; height: 45px; background: rgba(92, 95, 245, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--primary); }
.task-info { flex-grow: 1; }
.task-info h4 { font-size: 14px; margin-bottom: 4px; }
.task-info p { font-size: 10px; color: var(--text-dim); }
.reward-badge { background: rgba(77, 255, 136, 0.1); color: var(--green); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }

/* Global UI */
.nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 18, 35, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; padding: 10px; z-index: 1000; }
.nav-btn { color: var(--text-dim); background: none; border: none; font-size: 10px; flex: 1; text-align: center; }
.nav-btn.active { color: var(--primary); font-weight: bold; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
.btn-action { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; cursor: pointer; }
.glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }

#toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 25px; border-radius: 12px; z-index: 10000; transition: 0.5s; }
#live-notify { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(20, 25, 45, 0.9); border: 1px solid var(--primary); border-radius: 50px; padding: 8px 20px; font-size: 10px; display: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="live-notify"></div>
<div id="toast"></div>

<div id="sub-overlay" style="position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 25px;">
    <div class="glass-card" style="text-align: center; width: 100%;">
        <h3>نظام التحقق</h3>
        <p style="font-size: 12px; color: var(--text-dim); margin: 15px 0;">اشترك في القناة لتفعيل الحساب</p>
        <button class="btn-action" style="background: #0088cc;" onclick="window.open('https://t.me/Number433', '_blank')">اشترك الآن</button>
        <button class="btn-action" style="background: transparent; border: 1px solid var(--glass-border); margin-top: 10px;" onclick="verifySub()">تحقق من الاشتراك</button>
    </div>
</div>

<div id="main-content" style="filter: blur(10px); pointer-events: none;">
    <header class="cool-header">
        <div class="logo-num433">NUM<b>433</b></div>
        <div class="user-status-card"><span class="online-dot"></span><span id="u_name">تحميل...</span></div>
    </header>

    <div id="p-home" class="page active">
        <div class="glass-card" style="text-align: center;">
            <p style="color: var(--text-dim); font-size: 11px;">الرصيد الكلي</p>
            <div style="font-size: 42px; font-weight: 900; font-family: 'Poppins';">$<span id="balance">0.000</span></div>
        </div>

        <div class="glass-card" style="border-color: var(--accent);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4 style="color: var(--accent);">مكافآت Adsgram (20 يومياً)</h4>
                <span><b id="adsgram-watched">0</b>/20</span>
            </div>
            <button id="adsgram-btn" class="btn-action" style="background: var(--accent); color: black;" onclick="showAdsgramAd()">شاهد إعلان Adsgram</button>
        </div>

        <div class="glass-card">
            <h4 style="font-size: 14px; margin-bottom: 10px;">رتبة الحساب: <span id="u-level">VIP 1</span></h4>
            <div style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;">
                <div id="level-bar" style="height: 100%; background: var(--primary); width: 0%;"></div>
            </div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h3 style="text-align: center; margin-bottom: 20px;">المهام اليومية 🎯</h3>
        <div id="tasks-list"></div>
    </div>

    <div id="p-leaders" class="page">
        <h3 style="text-align: center; margin-bottom: 20px;">أقوى المستخدمين 🏆</h3>
        <div class="leader-card rank-1"><span class="l-amount">$342.50</span><div class="l-info"><span style="display: block; font-weight: bold;">أحمد المحمدي</span></div><span class="l-rank">👑</span></div>
    </div>

    <div id="p-refer" class="page">
        <h3 style="text-align: center; margin-bottom: 20px;">الدعوات 👥</h3>
        <div class="glass-card">
            <span id="ref-link" style="font-size: 10px;">تحميل...</span>
            <button class="btn-action" style="margin-top:10px; padding:10px;" onclick="copyRef()">نسخ الرابط</button>
        </div>
    </div>

    <div id="p-wallet" class="page">
        <h3 style="margin-bottom: 20px;">السحب 💰</h3>
        <div class="glass-card">
            <p>الحد الأدنى للسحب: $10.00</p>
            <p>الدعوات المطلوبة: 10</p>
            <hr style="margin:10px 0; opacity:0.1;">
            <button class="btn-action" onclick="selectPay('USDT')">سحب الأرباح</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="showTab('p-home', this)">🏠<br>الرئيسية</button>
        <button class="nav-btn" onclick="showTab('p-tasks', this)">🎯<br>المهام</button>
        <button class="nav-btn" onclick="showTab('p-leaders', this)">🏆<br>المتصدرين</button>
        <button class="nav-btn" onclick="showTab('p-refer', this)">👥<br>الدعوات</button>
        <button class="nav-btn" onclick="showTab('p-wallet', this)">💰<br>المحفظة</button>
    </nav>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// دمج البيانات: عداد للمهام العادية وعداد لـ Adsgram
let S = JSON.parse(localStorage.getItem('n433_final')) || { 
    balance: 0.000, 
    adsToday: 0,        // المهام الـ 10
    adsgramToday: 0,    // مهام Adsgram الـ 20
    refCount: 0, 
    isSubscribed: false,
    lastReset: Date.now() 
};

const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "28510" }) : null;

function save() { localStorage.setItem('n433_final', JSON.stringify(S)); updateUI(); }

function updateUI() {
    // تصفير يومي تلقائي
    if (Date.now() - S.lastReset > 86400000) {
        S.adsToday = 0; S.adsgramToday = 0; S.lastReset = Date.now(); save();
    }

    document.getElementById('balance').innerText = S.balance.toFixed(3);
    document.getElementById('adsgram-watched').innerText = S.adsgramToday;
    
    // تحديث بار Adsgram والزر
    const agBtn = document.getElementById('adsgram-btn');
    if(S.adsgramToday >= 20) { agBtn.disabled = true; agBtn.innerText = "اكتملت مهام Adsgram اليوم"; }

    // رتبة الـ VIP
    document.getElementById('level-bar').style.width = Math.min((S.balance/10)*100, 100) + "%";

    // بناء قائمة المهام الـ 10 (صفحة المهام)
    const list = document.getElementById('tasks-list');
    if(S.adsToday >= 10) {
        list.innerHTML = `<div class="glass-card" style="text-align:center;"><h4>✅ انتهت مهام الفيديو اليوم</h4></div>`;
    } else {
        let h = '';
        for(let i=S.adsToday+1; i<=10; i++) {
            h += `<div class="task-card">
                <div class="task-icon">🎬</div>
                <div class="task-info"><h4>فيديو #${i}</h4><p>مكافأة سريعة</p></div>
                <button class="btn-action" style="width:auto; padding:8px 15px;" onclick="doOldTask(this)">بدء</button>
            </div>`;
        }
        list.innerHTML = h;
    }
}

// تشغيل إعلان Adsgram (20 إعلان)
function showAdsgramAd() {
    if(S.adsgramToday >= 20) return showToast("وصلت للحد الأقصى لـ Adsgram");
    AdController.show().then(() => {
        S.balance += 0.015; S.adsgramToday += 1; save(); showToast("💰 تم إضافة الرصيد من Adsgram");
    }).catch(() => showToast("لم يكتمل الإعلان"));
}

// تشغيل المهام القديمة (10 مهام)
function doOldTask(btn) {
    btn.innerText = "...";
    show_10908620().then(() => {
        S.balance += 0.010; S.adsToday += 1; save(); showToast("💰 تم إضافة $0.010 لرصيدك");
    }).catch(() => { btn.innerText = "بدء"; });
}

function verifySub() { S.isSubscribed = true; save(); document.getElementById('sub-overlay').style.display='none'; document.getElementById('main-content').style.filter='none'; document.getElementById('main-content').style.pointerEvents='auto'; }
if(S.isSubscribed) verifySub();

function showTab(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active'); btn.classList.add('active');
}

function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.top = '20px'; setTimeout(() => t.style.top = '-100px', 3000); }

function copyRef() { navigator.clipboard.writeText(document.getElementById('ref-link').innerText); showToast("🔗 تم نسخ الرابط"); }

const user = tg.initDataUnsafe?.user;
document.getElementById('u_name').innerText = user?.first_name || "Guest";
document.getElementById('ref-link').innerText = `https://t.me/Number433bot?start=${user?.id || '6619233998'}`;

updateUI();
</script>
</body>
</html>
