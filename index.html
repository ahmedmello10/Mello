<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number 433 Elite - Fixed Edition</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://adsgram.ai/sdk-v1.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070912;
  --primary: #5c5ff5;
  --accent: #c9a84c;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-dim: #8489b2;
  --green: #4dff88;
  --fast-earn: #ffbc00;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: white; font-family: 'Tajawal', sans-serif; min-height: 100vh; padding: 10px 15px 120px; direction: rtl; overflow-x: hidden; }

/* Overlay Fix */
#sub-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 25px;
}

/* Header */
.cool-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
.logo-num433 { font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 800; color: white; }
.logo-num433 b { color: var(--primary); }

/* Buttons */
.btn-action { 
    background: var(--primary); 
    color: white; 
    border: none; 
    width: 100%; 
    padding: 16px; 
    border-radius: 15px; 
    font-weight: 900; 
    cursor: pointer; 
    font-family: 'Tajawal';
    transition: 0.3s;
    display: block;
    text-align: center;
    text-decoration: none;
}
.btn-action:active { transform: scale(0.95); opacity: 0.8; }
.btn-fast { background: var(--fast-earn); color: #000; }

/* Task Cards */
.task-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }

.nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 18, 35, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; padding: 10px; z-index: 1000; }
.nav-btn { color: var(--text-dim); background: none; border: none; font-size: 10px; flex: 1; text-align: center; }
.nav-btn.active { color: var(--primary); font-weight: bold; }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease; }

#toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 25px; border-radius: 12px; z-index: 100000; transition: 0.5s; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="toast"></div>

<div id="sub-overlay">
    <div class="glass-card" style="text-align: center; width: 100%; border-color: var(--primary);">
        <div style="font-size: 50px; margin-bottom: 15px;">🔒</div>
        <h3 style="margin-bottom: 10px;">تفعيل الحساب</h3>
        <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 25px;">يجب عليك الانضمام لقناتنا الرسمية لتتمكن من جمع الأرباح وسحبها.</p>
        
        <a href="https://t.me/Number433" target="_blank" class="btn-action" style="background: #0088cc; margin-bottom: 12px;">1. انضم للقناة الآن</a>
        
        <button class="btn-action" style="background: transparent; border: 1px solid var(--glass-border);" onclick="verifySub()">2. تحقق من الانضمام</button>
    </div>
</div>

<div id="main-content" style="filter: blur(15px); pointer-events: none;">
    <header class="cool-header">
        <div class="logo-num433">NUM<b>433</b></div>
        <div class="user-status-card" style="background: var(--glass); padding: 5px 15px; border-radius: 20px;">
            <span id="u_name">...</span>
        </div>
    </header>

    <div id="p-home" class="page active">
        <div class="glass-card" style="text-align: center; background: linear-gradient(to bottom, rgba(92,95,245,0.1), transparent);">
            <p style="color: var(--text-dim); font-size: 12px;">رصيدك الحالي</p>
            <div style="font-size: 45px; font-weight: 900; font-family: 'Poppins'; margin: 10px 0; color: #fff;">$<span id="balance">0.000</span></div>
        </div>

        <div class="glass-card" style="border: 1px solid var(--fast-earn); background: rgba(255,188,0,0.05);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4 style="color: var(--fast-earn);">⚡ الكسب السريع</h4>
                    <p style="font-size: 11px; color: var(--text-dim);">متاح: <span id="fast-count">20</span> إعلان</p>
                </div>
                <button class="btn-action btn-fast" style="width: auto; padding: 10px 20px;" onclick="showTab('p-tasks', document.getElementById('btn-task-nav')); switchTaskType('fast');">ابدأ</button>
            </div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="tab-normal" class="btn-action" style="padding: 12px;" onclick="switchTaskType('normal')">المهام (10)</button>
            <button id="tab-fast" class="btn-action btn-fast" style="padding: 12px;" onclick="switchTaskType('fast')">السريع (20)</button>
        </div>
        <div id="tasks-list"></div>
    </div>

    <div id="p-wallet" class="page">
        <h3 style="margin-bottom: 20px;">السحب</h3>
        <div class="glass-card">
            <p style="font-size: 12px; color: var(--text-dim);">الحد الأدنى للسحب هو 10$.</p>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="showTab('p-home', this)">🏠<br>الرئيسية</button>
        <button id="btn-task-nav" class="nav-btn" onclick="showTab('p-tasks', this)">🎯<br>المهام</button>
        <button class="nav-btn" onclick="showTab('p-wallet', this)">💰<br>المحفظة</button>
    </nav>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Adsgram
const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "28510" }) : null;

// Data
let S = JSON.parse(localStorage.getItem('n433_pro')) || { 
    balance: 0.000, 
    adsToday: 0, 
    fastAdsToday: 0, 
    isSubscribed: false,
    lastReset: Date.now()
};

// 24h Reset
if (Date.now() - S.lastReset > 86400000) {
    S.adsToday = 0; S.fastAdsToday = 0; S.lastReset = Date.now();
    save();
}

function save() { 
    localStorage.setItem('n433_pro', JSON.stringify(S)); 
    updateUI(); 
}

function verifySub() {
    // محاكاة للتحقق - في الحقيقة يفضل ربطه بـ API
    showToast("⏳ جاري التحقق...");
    setTimeout(() => {
        S.isSubscribed = true;
        save();
        document.getElementById('sub-overlay').style.display = 'none';
        document.getElementById('main-content').style.filter = 'none';
        document.getElementById('main-content').style.pointerEvents = 'auto';
        showToast("✅ تم التفعيل بنجاح");
    }, 1500);
}

// التأكد من الحالة عند فتح التطبيق
if (S.isSubscribed) {
    document.getElementById('sub-overlay').style.display = 'none';
    document.getElementById('main-content').style.filter = 'none';
    document.getElementById('main-content').style.pointerEvents = 'auto';
}

function updateUI() {
    document.getElementById('balance').innerText = S.balance.toFixed(3);
    document.getElementById('fast-count').innerText = (20 - S.fastAdsToday);
    renderTasks();
}

let currentTaskType = 'normal';
function switchTaskType(type) {
    currentTaskType = type;
    document.getElementById('tab-normal').style.opacity = type === 'normal' ? '1' : '0.5';
    document.getElementById('tab-fast').style.opacity = type === 'fast' ? '1' : '0.5';
    renderTasks();
}

function renderTasks() {
    const list = document.getElementById('tasks-list');
    let h = '';
    if (currentTaskType === 'normal') {
        let rem = 10 - S.adsToday;
        if(rem <= 0) h = '<div class="glass-card">انتهت مهام اليوم</div>';
        else {
            for(let i=1; i<=rem; i++) h += taskItem("مهمة فيديو", "$0.01", "doNormalTask(this)");
        }
    } else {
        let rem = 20 - S.fastAdsToday;
        if(rem <= 0) h = '<div class="glass-card">انتهت مهام السريع</div>';
        else {
            for(let i=1; i<=rem; i++) h += taskItem("كسب سريع", "$0.005", "doFastTask(this)");
        }
    }
    list.innerHTML = h;
}

function taskItem(name, price, action) {
    return `<div class="task-card">
        <div style="flex-grow:1"><h4>${name}</h4><small>${price}</small></div>
        <button class="btn-action" style="width:auto; padding:8px 15px;" onclick="${action}">مشاهدة</button>
    </div>`;
}

function doNormalTask(btn) {
    btn.disabled = true; btn.innerText = "...";
    show_10908620().then(() => {
        S.balance += 0.01; S.adsToday++; save();
        showToast("💰 +$0.01");
    }).catch(() => { btn.disabled = false; btn.innerText = "مشاهدة"; });
}

function doFastTask(btn) {
    if(!AdController) return showToast("Adsgram Not Ready");
    btn.disabled = true;
    AdController.show().then(() => {
        S.balance += 0.005; S.fastAdsToday++; save();
        showToast("⚡ +$0.005");
    }).catch(() => { btn.disabled = false; });
}

function showTab(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.top = '20px';
    setTimeout(() => t.style.top = '-100px', 2500);
}

document.getElementById('u_name').innerText = tg.initDataUnsafe?.user?.first_name || "Guest";
updateUI();
</script>
</body>
</html>
