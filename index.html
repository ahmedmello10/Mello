<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number 433 Premium v3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0b1e;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0a0b1e);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            padding: 20px 16px 100px;
            direction: rtl;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .hero-section { text-align: center; padding: 20px 0; }
        .balance-amount { 
            font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; 
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .task-card {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.02); border-radius: 18px;
            padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-claim {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 12px; font-weight: bold;
            box-shadow: 0 4px 15px var(--primary-glow); cursor: pointer;
        }
        .btn-claim:disabled { background: #334155; box-shadow: none; opacity: 0.5; }

        .nav-bar {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            display: flex; padding: 8px; z-index: 1000;
        }
        .nav-item {
            flex: 1; background: none; border: none; color: var(--text-dim);
            font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 24px;
            border-radius: 12px; z-index: 2000; display: none;
        }

        .live-activity-footer {
            margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.02);
            border-radius: 15px; border: 1px solid var(--glass-border); text-align: center;
        }
        .dot {
            height: 8px; width: 8px; background-color: #10b981; border-radius: 50%;
            display: inline-block; margin-left: 8px; box-shadow: 0 0 8px #10b981;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="toast"></div>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2 style="font-family:'Syne';">NUM<span style="color:var(--primary)">433</span></h2>
    <div id="user-chip" style="background:var(--glass); padding:6px 12px; border-radius:50px; font-size:12px;">
        👤 <span id="u_name">المستخدم</span>
    </div>
</div>

<div id="p-home" class="page active">
    <div class="hero-section">
        <p style="color:var(--text-dim)">رصيدك الحالي</p>
        <div class="balance-amount">$<span id="balance">0.000</span></div>
    </div>
    <div class="glass-card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div style="text-align:center;">
                <p style="font-size:11px; color:var(--text-dim)">أرباح اليوم</p>
                <b id="today-profit">$0.00</b>
            </div>
            <div style="text-align:center;">
                <p style="font-size:11px; color:var(--text-dim)">إجمالي السحب</p>
                <b>$0.00</b>
            </div>
        </div>
    </div>
    <div class="live-activity-footer">
        <span class="dot"></span> <span id="activity-text" style="font-size:12px; color:var(--text-dim)">جاري التحديث...</span>
    </div>
</div>

<div id="p-tasks" class="page">
    <h3 style="margin-bottom:20px;">المهام اليومية</h3>
    <div id="tasks-list"></div>
</div>

<div id="p-refer" class="page">
    <div class="glass-card" style="text-align:center;">
        <h3>ادعُ أصدقاءك</h3>
        <div id="ref-link" style="margin:15px 0; font-size:12px; color:var(--primary); word-break:break-all;">...</div>
        <button class="btn-claim" style="width:100%" onclick="copyRef()">نسخ الرابط</button>
    </div>
</div>

<div id="p-wallet" class="page">
    <h3>المحفظة</h3>
    <div class="glass-card">
        <p style="font-size:12px; color:var(--text-dim)">المبلغ القابل للسحب</p>
        <h2 id="with-balance">$0.000</h2>
    </div>
    <p style="color:var(--accent); text-align:center; font-size:12px; margin-bottom:10px;">الحد الأدنى $10.00</p>
    <button class="btn-claim" style="width:100%; padding:15px;" disabled>سحب الأرباح</button>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showTab('p-home', this)">الرئيسية</button>
    <button class="nav-item" onclick="showTab('p-tasks', this)">المهام</button>
    <button class="nav-item" onclick="showTab('p-refer', this)">الإحالات</button>
    <button class="nav-item" onclick="showTab('p-wallet', this)">المحفظة</button>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let S = JSON.parse(localStorage.getItem('n433_v3')) || { balance: 0.0, tasksDone: 0, lastTaskDate: null };

    // إصلاح السحب الوهمي
    const activities = ["سحب $15.00 (فودافون)", "سحب $20.00 (USDT)", "سحب $10.50 (اتصالات)", "سحب $30.00 (بايبال)"];
    setInterval(() => {
        const txt = activities[Math.floor(Math.random() * activities.length)];
        const el = document.getElementById('activity-text');
        if(el) el.innerText = txt;
    }, 4000);

    function showTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function updateUI() {
        document.getElementById('balance').innerText = S.balance.toFixed(3);
        document.getElementById('with-balance').innerText = "$" + S.balance.toFixed(3);
        document.getElementById('today-profit').innerText = "$" + (S.tasksDone * 0.05).toFixed(2);
        renderTasks();
    }

    function renderTasks() {
        let html = '';
        if(S.tasksDone >= 10) {
            html = '<p style="text-align:center; color:gray;">عد غداً للمزيد</p>';
        } else {
            for(let i = S.tasksDone + 1; i <= 10; i++) {
                html += `<div class="task-card"><span>إعلان #${i}</span><button class="btn-claim" onclick="runTask(this)">مشاهدة</button></div>`;
            }
        }
        document.getElementById('tasks-list').innerHTML = html;
    }

    function runTask(btn) {
        btn.disabled = true;
        show_10908620().then(() => {
            S.balance += 0.05;
            S.tasksDone += 1;
            localStorage.setItem('n433_v3', JSON.stringify(S));
            updateUI();
            showToast("💰 تم الإضافة");
        }).catch(() => { btn.disabled = false; });
    }

    function copyRef() {
        navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
        showToast("🔗 تم النسخ");
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display='none', 2000);
    }

    if(tg.initDataUnsafe.user) {
        document.getElementById('u_name').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('ref-link').innerText = "https://t.me/Number433bot?start=" + tg.initDataUnsafe.user.id;
    }

    updateUI();
</script>
</body>
</html>
