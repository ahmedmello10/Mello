<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0b0e1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* البطاقة الأساسية */
        .main-card {
            background: linear-gradient(145deg, #1a1f35, #121526);
            border-radius: 25px;
            padding: 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2d3550;
        }

        .title { color: #a0a6c0; font-size: 18px; margin-bottom: 10px; }
        
        .balance {
            font-size: 55px;
            font-weight: 900;
            margin: 15px 0;
            letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .stats-container { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }

        .stat-box {
            background-color: #1c213a;
            padding: 12px;
            border-radius: 15px;
            flex: 1;
            font-size: 14px;
            color: #e0e0e0;
        }

        /* زر كسب سريع */
        .quick-earn-btn {
            background-color: #6366f1;
            color: white;
            width: 350px;
            margin-top: 20px;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .quick-earn-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="title">إجمالي الرصيد</div>
        <div class="balance">$0.100</div>
        
        <div class="stats-container">
            <div class="stat-box">إعلانات اليوم: 2/10</div>
            <div class="stat-box">إجمالي الربح: $0.10</div>
        </div>
    </div>

    <button class="quick-earn-btn">
        <span>▶</span>
        كسب سريع ($0.05)
    </button>

</body>
</html>
