<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number 433 Elite - Professional Edition</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://adsgram.ai/sdk-v1.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070912;
  --primary: #5c5ff5;
  --accent: #c9a84c;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-dim: #8489b2;
  --green: #4dff88;
  --red: #ff4d4d;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: white; font-family: 'Tajawal', sans-serif; min-height: 100vh; padding: 10px 15px 120px; direction: rtl; }

/* Header */
.cool-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
.logo-num433 { font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 800; color: white; }
.logo-num433 b { color: var(--primary); }
.user-status-card { display: flex; align-items: center; gap: 8px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50px; padding: 6px 12px; font-size: 12px; }
.online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

/* Ads Section Style */
.ads-banner {
    background: linear-gradient(135deg, #5c5ff5 0%, #2a2d8a 100%);
    border-radius: 20px;
    padding: 20px;
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 10px 20px rgba(92, 95, 245, 0.2);
}

.ads-content h3 { font-size: 18px; margin-bottom: 5px; }
.ads-content p { font-size: 11px; opacity: 0.8; }

/* Global UI */
.nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 18, 35, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; padding: 10px; z-index: 1000; }
.nav-btn { color: var(--text-dim); background: none; border: none; font-size: 10px; flex: 1; text-align: center; }
.nav-btn.active { color: var(--primary); font-weight: bold; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
.btn-action { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; cursor: pointer; }
.glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }

#toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 25px; border-radius: 12px; z-index: 10000; transition: 0.5s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="toast"></div>

<div id="sub-overlay" style="position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 25px;">
    <div class="glass-card" style="text-align: center; width: 100%;">
        <div style="font-size: 40px; margin-bottom: 15px;">👑</div>
        <h3>نظام التحقق</h3>
        <p style="font-size: 12px; color: var(--text-dim); margin: 15px 0 25px;">اشترك في القناة لتفعيل الحساب واستلام الأرباح.</p>
        <button class="btn-action" style="background: #0088cc;" onclick="window.open('https://t.me/Number433', '_blank')">اشترك الآن</button>
        <button class="btn-action" style="background: transparent; border: 1px solid var(--glass-border); margin-top: 10px;" onclick="verifySub()">تحقق من الاشتراك</button>
    </div>
</div>

<div id="main-content">
    <header class="cool-header">
        <div class="logo-num433">NUM<b>433</b></div>
        <div class="user-status-card">
            <span class="online-dot"></span>
            <span id="u_name">تحميل...</span>
        </div>
    </header>

    <div id="p-home" class="page active">
        <div class="glass-card" style="text-align: center; background: linear-gradient(to bottom, rgba(92,95,245,0.1), transparent);">
            <p style="color: var(--text-dim); font-size: 11px;">الرصيد القابل للسحب</p>
            <div style="font-size: 42px; font-weight: 900; font-family: 'Poppins'; margin: 10px 0;">$<span id="balance">0.000</span></div>
        </div>
        
        <div class="ads-banner" onclick="runAdsGram()">
            <div class="ads-content">
                <h3>💎 الكنز اليومي</h3>
                <p>شاهد الإعلانات واربح ($0.005 لكل إعلان)</p>
                <div style="margin-top: 8px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.2); display: inline-block; padding: 2px 10px; border-radius: 10px;" id="ads-counter">20 / 20</div>
            </div>
            <div style="font-size: 30px;">🎁</div>
        </div>

        <div class="glass-card" style="margin-top:15px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4 style="color: var(--accent); font-size: 14px;">رتبة الحساب: <span id="u-level">VIP 1</span></h4>
            </div>
            <div style="height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;">
                <div id="level-bar" style="height: 100%; background: var(--primary); width: 0%; transition: 0.8s;"></div>
            </div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <div style="text-align: center; margin-bottom: 20px;">
            <h3 style="font-size: 20px;">مركز المهام 🎯</h3>
        </div>
        <div id="tasks-list"></div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="showTab('p-home', this)">🏠<br>الرئيسية</button>
        <button class="nav-btn" onclick="showTab('p-tasks', this)">🎯<br>المهام</button>
        <button class="nav-btn" onclick="showTab('p-leaders', this)">🏆<br>المتصدرين</button>
        <button class="nav-btn" onclick="showTab('p-refer', this)">👥<br>الدعوات</button>
        <button class="nav-btn" onclick="showTab('p-wallet', this)">💰<br>المحفظة</button>
    </nav>
</div>

<script>
const tg = window.Telegram.WebApp; 
tg.expand();

// الإعدادات وحفظ البيانات
let S = JSON.parse(localStorage.getItem('n433_pro')) || { 
    balance: 0.000, 
    adsToday: 0, 
    lastReset: new Date().getTime(),
    refCount: 0, 
    isSubscribed: false 
};

// فحص مرور 24 ساعة لتصفير العداد
function checkDailyReset() {
    const now = new Date().getTime();
    const oneDay = 24 * 60 * 60 * 1000;
    if (now - S.lastReset > oneDay) {
        S.adsToday = 0;
        S.lastReset = now;
        save();
    }
}
checkDailyReset();

// تهيئة AdsGram
const AdController = window.Adsgram.init({ blockId: "28510" });

function runAdsGram() {
    if (S.adsToday >= 20) {
        showToast("⚠️ انتهت محاولاتك! عد بعد 24 ساعة");
        return;
    }

    AdController.show().then((result) => {
        S.balance += 0.005; // القيمة اللي بتحددها لكل إعلان
        S.adsToday += 1;
        save();
        showToast("💰 تم إضافة المكافأة للحساب");
    }).catch((err) => {
        showToast("❌ حدث خطأ أو تم إغلاق الإعلان");
    });
}

function save() { 
    localStorage.setItem('n433_pro', JSON.stringify(S)); 
    updateUI(); 
}

function updateUI() { 
    document.getElementById('balance').innerText = S.balance.toFixed(3);
    document.getElementById('ads-counter').innerText = `${20 - S.adsToday} / 20`;
    
    // شريط المستوى
    let prog = (S.balance / 10) * 100;
    document.getElementById('level-bar').style.width = Math.min(prog, 100) + "%";
}

function showTab(id, btn) { 
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
    btn.classList.add('active'); 
}

function showToast(msg) { 
    const t = document.getElementById('toast'); 
    t.innerText = msg; 
    t.style.top = '20px'; 
    setTimeout(() => t.style.top = '-100px', 3000); 
}

// بيانات المستخدم
const user = tg.initDataUnsafe?.user;
document.getElementById('u_name').innerText = user?.first_name || "Guest";

updateUI();
</script>
</body>
</html>
