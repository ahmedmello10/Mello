<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number 433</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>

    <style>
        /* التنسيق القديم اللي حبيته */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 20px;
            text-align: center;
        }

        .header-logo {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .header-logo span { color: #5c5ff5; }

        /* الكروت البسيطة بدون تعقيد */
        .card {
            background: #111;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        .balance-title { color: #888; font-size: 14px; }
        .balance-amount { 
            font-family: 'Syne', sans-serif; 
            font-size: 42px; 
            margin: 5px 0; 
        }

        /* الأزرار الواضحة */
        .main-btn {
            background: #5c5ff5;
            color: #fff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        .main-btn:active { transform: scale(0.98); }

        /* الميزات الجديدة (بستايل قديم) */
        .mystery-section {
            border: 2px dashed #a154ff;
            background: #0d001a;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-family: 'Tajawal';
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-size: 13px;
            color: #888;
        }

        .withdraw-area {
            background: #111;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="header-logo">NUM<span>433</span></div>

    <div class="card">
        <div class="balance-title">رصيدك الحالي</div>
        <div class="balance-amount">$<span id="bal">0.00</span></div>
        <div class="stats">
            <div>إعلانات: <b id="ads">0</b>/10</div>
            <div>إحالات: <b id="refs">0</b></div>
        </div>
    </div>

    <button class="main-btn" onclick="earn()">▶️ مشاهدة إعلان ($0.10)</button>

    <div class="mystery-section" onclick="openBox()">
        <div style="font-size: 30px;">🎁</div>
        <div style="font-weight: bold; color: #a154ff;">صندوق الحظ</div>
        <div id="box-status" style="font-size: 12px; color: #888;">شاهد 3 إعلانات للفتح</div>
    </div>

    <div class="withdraw-area">
        <label style="font-size: 14px;">طريقة السحب:</label>
        <select id="method" class="input-field">
            <option value="Binance Pay">Binance Pay ID</option>
            <option value="Trust Wallet">Trust Wallet (USDT)</option>
        </select>
        <input type="text" id="address" class="input-field" placeholder="العنوان أو الآيدي">
        <button class="main-btn" style="background: #f1c40f; color: #000;" onclick="withdraw()">سحب الأرباح (10$)</button>
    </div>

    <div style="margin-top: 20px; font-size: 12px; color: #666;">
        رابط الإحالة الخاص بك:<br>
        <span id="ref-link" style="color: #5c5ff5;">...</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = "6619233998"; 
        const BOT_TOKEN = "8718619320:AAEYA7qmpnSx4rxPdo9RdNesZ0Yzz5GaaIU";

        let data = JSON.parse(localStorage.getItem('n433_v1')) || {
            bal: 0.00, ads: 0, refs: 0, boxStep: 0
        };

        function update() {
            document.getElementById('bal').innerText = data.bal.toFixed(2);
            document.getElementById('ads').innerText = data.ads;
            document.getElementById('refs').innerText = data.refs;
            document.getElementById('ref-link').innerText = `https://t.me/Number433bot?start=${tg.initDataUnsafe.user?.id || '433'}`;
            localStorage.setItem('n433_v1', JSON.stringify(data));
        }

        // إعلان فوري عند الدخول
        setTimeout(() => { show_10908620().catch(e => {}); }, 1500);

        function earn() {
            if(data.ads >= 10) return alert("انتهت محاولات اليوم");
            show_10908620().then(() => {
                data.bal += 0.10;
                data.ads++;
                update();
            });
        }

        function openBox() {
            if(data.boxStep < 3) {
                show_10908620().then(() => {
                    data.boxStep++;
                    if(data.boxStep === 3) {
                        data.bal += 0.50;
                        data.boxStep = 0;
                        alert("مبروك! ربحت 0.50$");
                    }
                    document.getElementById('box-status').innerText = `باقي ${3 - data.boxStep} إعلانات`;
                    update();
                });
            }
        }

        function withdraw() {
            const addr = document.getElementById('address').value;
            if(data.bal < 10) return alert("لازم تجمع 10$ الأول");
            if(!addr) return alert("اكتب العنوان!");

            const msg = `💰 *طلب سحب جديد*%0A👤 المستخدم: ${tg.initDataUnsafe.user?.first_name}%0A🆔 الآيدي: ${tg.initDataUnsafe.user?.id}%0A💵 المبلغ: ${data.bal}$%0A🏦 الطريقة: ${document.getElementById('method').value}%0A📍 العنوان: ${addr}`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${msg}&parse_mode=Markdown`)
            .then(() => {
                alert("تم الإرسال للمدير!");
                data.bal = 0;
                update();
            });
        }

        update();
    </script>
</body>
</html>
