<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number 433 Premium v3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0b1e;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0a0b1e);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            padding: 20px 16px 100px;
            direction: rtl;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .balance-amount { 
            font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; 
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .btn-claim {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 12px; font-weight: bold;
            box-shadow: 0 4px 15px var(--primary-glow); cursor: pointer;
        }
        .btn-claim:disabled { background: #334155; opacity: 0.5; }

        .nav-bar {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            display: flex; padding: 8px; z-index: 1000;
        }
        .nav-item {
            flex: 1; background: none; border: none; color: var(--text-dim);
            font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .live-activity-footer {
            margin-top: 15px; padding: 12px; background: rgba(255, 255, 255, 0.02);
            border-radius: 15px; border: 1px solid var(--glass-border); text-align: center;
        }

        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 24px;
            border-radius: 12px; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="p-home" class="page active">
    <div style="text-align: center; padding: 20px 0;">
        <p style="color:var(--text-dim)">رصيدك الحالي</p>
        <div class="balance-amount">$<span id="balance">0.000</span></div>
    </div>
    
    <div class="glass-card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; text-align:center;">
            <div><p style="font-size:11px; color:var(--text-dim)">أرباح اليوم</p><b id="today-profit">$0.00</b></div>
            <div><p style="font-size:11px; color:var(--text-dim)">إجمالي السحب</p><b>$0.00</b></div>
        </div>
    </div>

    <div class="live-activity-footer">
        <span style="height:8px; width:8px; background:#10b981; border-radius:50%; display:inline-block; margin-left:8px;"></span>
        <span id="activity-text" style="font-size:11px; color:var(--accent)">جاري جلب عمليات السحب...</span>
    </div>
</div>

<div id="p-tasks" class="page">
    <h3>المهام اليومية</h3>
    <div id="tasks-list" style="margin-top:20px;"></div>
</div>

<div id="p-refer" class="page">
    <div class="glass-card" style="text-align:center;">
        <h3>ادعُ أصدقاءك</h3>
        <div id="ref-link" style="padding:15px; background:rgba(0,0,0,0.2); border-radius:10px; font-size:11px; margin:15px 0; word-break:break-all;">...</div>
        <button class="btn-claim" style="width:100%" onclick="copyRef()">نسخ الرابط</button>
    </div>
</div>

<div id="p-wallet" class="page">
    <h3>المحفظة</h3>
    <div class="glass-card" style="margin-top:15px;">
        <p style="font-size:12px; color:var(--text-dim)">المبلغ القابل للسحب</p>
        <h2 id="with-balance" style="font-family:'Syne';">$0.000</h2>
    </div>

    <div class="glass-card">
        <h4 style="margin-bottom:15px; font-size:13px;">اختر وسيلة السحب:</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div style="padding:15px; border:1px solid var(--glass-border); border-radius:12px; text-align:center;">Binance</div>
            <div style="padding:15px; border:1px solid var(--glass-border); border-radius:12px; text-align:center;">USDT</div>
        </div>
    </div>

    <p style="color:var(--accent); text-align:center; font-size:12px; margin-bottom:15px;">الحد الأدنى للسحب هو $10.00</p>
    <button class="btn-claim" style="width:100%; padding:18px;" disabled>طلب سحب الأرباح</button>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showTab('p-home', this)">الرئيسية</button>
    <button class="nav-item" onclick="showTab('p-tasks', this)">المهام</button>
    <button class="nav-item" onclick="showTab('p-refer', this)">الإحالات</button>
    <button class="nav-item" onclick="showTab('p-wallet', this)">المحفظة</button>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let S = JSON.parse(localStorage.getItem('n433_v3')) || { balance: 0.0, tasksDone: 0, lastTaskDate: null };

    // نظام السحب الوهمي بالأسفل
    const activities = [
        "عميل سحب $15.50 عبر Binance",
        "تم دفع $22.00 بنجاح (USDT)",
        "عميل سحب $10.00 عبر Binance",
        "تم تحويل $50.00 لعميل مميز"
    ];
    setInterval(() => {
        const txt = activities[Math.floor(Math.random() * activities.length)];
        document.getElementById('activity-text').innerText = txt;
    }, 4000);

    function showTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function updateUI() {
        document.getElementById('balance').innerText = S.balance.toFixed(3);
        document.getElementById('with-balance').innerText = "$" + S.balance.toFixed(3);
        document.getElementById('today-profit').innerText = "$" + (S.tasksDone * 0.05).toFixed(2);
        renderTasks();
    }

    function renderTasks() {
        let html = '';
        if(S.tasksDone >= 10) {
            html = '<p style="text-align:center; color:gray;">انتهت مهام اليوم</p>';
        } else {
            for(let i = S.tasksDone + 1; i <= 10; i++) {
                html += `<div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.05);">
                    <span>مهمة #${i}</span>
                    <button class="btn-claim" onclick="runTask(this)">مشاهدة</button>
                </div>`;
            }
        }
        document.getElementById('tasks-list').innerHTML = html;
    }

    function runTask(btn) {
        btn.disabled = true;
        show_10908620().then(() => {
            S.balance += 0.05; S.tasksDone += 1;
            localStorage.setItem('n433_v3', JSON.stringify(S));
            updateUI();
            showToast("💰 تم إضافة الربح");
        }).catch(() => btn.disabled = false);
    }

    function copyRef() {
        navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
        showToast("🔗 تم النسخ");
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display='none', 2000);
    }

    if(tg.initDataUnsafe.user) {
        document.getElementById('ref-link').innerText = "https://t.me/Number433bot?start=" + tg.initDataUnsafe.user.id;
    }

    updateUI();
</script>
</body>
</html>
