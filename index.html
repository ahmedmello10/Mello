<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5d5fef;
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #1a1f35 0%, #05070a 100%);
            color: white; font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 15px; overflow-x: hidden;
        }

        /* نظام الإعلانات الخاص بك (Banner) */
        .my-ad-container {
            width: 100%;
            background: linear-gradient(90deg, rgba(93,95,239,0.2), rgba(0,0,0,0));
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
            font-size: 13px;
        }

        /* بطاقة الرصيد (ستايل Finova الزجاجي) */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .balance-num {
            font-family: 'Inter', sans-serif; /* للأرقام فقط لتبدو احترافية */
            font-size: 55px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* زر الإعلانات (Quick Earn) */
        .earn-action {
            width: 100%;
            background: var(--primary);
            border: none; padding: 18px;
            border-radius: 20px;
            color: white; font-size: 20px; font-weight: 900;
            margin-top: 20px; cursor: pointer;
            box-shadow: 0 0 20px rgba(93, 95, 239, 0.4);
        }

        /* نظام السحب (أيقونات فقط - بينانس ودولار) */
        .withdraw-section {
            margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .method-item {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px; text-align: center;
        }

        .method-item img { width: 45px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }

        /* شريط التنقل السفلي */
        .nav-bottom {
            position: fixed; bottom: 15px; left: 5%; width: 90%;
            background: rgba(13, 17, 29, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 12px;
        }
        
        .nav-icon { color: #555; text-decoration: none; font-weight: bold; font-size: 14px; }
        .nav-icon.active { color: var(--primary); }

        /* لغة إنجليزية */
        [lang="en"] .tajawal { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body id="bodyTag">

    <div style="text-align: left; margin-bottom: 10px;">
        <button onclick="changeLang()" id="btnL" style="background:none; border:1px solid var(--border); color:white; padding:5px 10px; border-radius:10px;">English</button>
    </div>

    <div class="my-ad-container" onclick="window.open('لينك_اعلانك_هنا')">
        <span style="background:var(--primary); padding:2px 8px; border-radius:5px; font-size:10px;">AD</span>
        <marquee id="adText">إعلانك الخاص: اشترك الآن في قناة العروض الحصرية واربح مكافآت مضاعفة!</marquee>
    </div>

    <div class="glass-card">
        <div style="color:#8e94a8; font-weight: bold;" id="txtBal">إجمالي الرصيد</div>
        <div class="balance-num">$0.100</div>
        
        <div style="display:flex; justify-content: space-around; margin-top:20px;">
            <div style="font-size:13px;"><span id="txtAds">إعلانات:</span> <b style="color:var(--primary)">2/10</b></div>
            <div style="font-size:13px;"><span id="txtProfit">أرباح:</span> <b style="color:var(--primary)">$0.10</b></div>
        </div>
    </div>

    <button class="earn-action" onclick="showMyAd()" id="btnEarn">
        كسب سريع ($0.05)
    </button>

    <div style="margin-top:25px; font-weight:bold; color:#8e94a8;" id="txtWith">نظام السحب</div>
    <div class="withdraw-section">
        <div class="method-item">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png">
            <div style="margin-top:10px; font-weight:900;">Binance</div>
        </div>
        <div class="method-item">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
            <div style="margin-top:10px; font-weight:900;">USDT</div>
        </div>
    </div>

    <div class="nav-bottom">
        <a href="#" class="nav-icon active" id="n1">الرئيسية</a>
        <a href="#" class="nav-icon" id="n2">المهام</a>
        <a href="#" class="nav-icon" id="n3">الأصدقاء</a>
        <a href="#" class="nav-icon" id="n4">الترتيب</a>
    </div>

    <script>
        function changeLang() {
            let b = document.getElementById('bodyTag');
            let h = document.getElementById('mainHtml');
            if(h.dir == "rtl") {
                h.dir = "ltr"; h.lang = "en";
                document.getElementById('btnL').innerText = "العربية";
                document.getElementById('txtBal').innerText = "TOTAL BALANCE";
                document.getElementById('btnEarn').innerText = "Quick Earn ($0.05)";
                // تكملة باقي الترجمة...
            } else {
                h.dir = "rtl"; h.lang = "ar";
                document.getElementById('btnL').innerText = "English";
                document.getElementById('txtBal').innerText = "إجمالي الرصيد";
                // ...
            }
        }

        function showMyAd() {
            alert("هنا يتم تشغيل نظام إعلاناتك الخاص (Pop-up أو Redirect)");
        }
    </script>
</body>
</html>
