<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number 433 Elite - Professional Edition</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.adsgram.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070912;
  --primary: #5c5ff5;
  --accent: #c9a84c;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-dim: #8489b2;
  --green: #4dff88;
  --red: #ff4d4d;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: white; font-family: 'Tajawal', sans-serif; min-height: 100vh; padding: 10px 15px 120px; direction: rtl; }

/* Header */
.cool-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
.logo-num433 { font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 800; color: white; }
.logo-num433 b { color: var(--primary); }
.user-status-card { display: flex; align-items: center; gap: 8px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50px; padding: 6px 12px; font-size: 12px; }
.online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

/* AdsGram Special Card - تصميم مطابق للصورة */
.adsgram-card {
    background: #0f121d;
    border: 1px solid var(--glass-border);
    border-radius: 35px; /* حواف دائرية كبيرة */
    padding: 20px 25px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
}
/* الاستايل الملون في طرف الكارد */
.adsgram-card::after {
    content: '';
    position: absolute;
    right: 0;
    top: 15%;
    bottom: 15%;
    width: 6px;
    background: var(--primary);
    border-radius: 10px 0 0 10px;
    box-shadow: -2px 0 10px var(--primary);
}
.adsgram-info { text-align: right; }
.adsgram-info h3 { font-size: 18px; font-weight: 900; margin-bottom: 2px; }
.adsgram-info p { font-size: 12px; color: var(--text-dim); }

.btn-start {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(92, 95, 245, 0.3);
}
.btn-start:disabled { background: #333; opacity: 0.6; box-shadow: none; }

/* بقية الاستايلات الأساسية */
.task-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
.glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
.nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 18, 35, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; padding: 10px; z-index: 1000; }
.nav-btn { color: var(--text-dim); background: none; border: none; font-size: 10px; flex: 1; text-align: center; }
.nav-btn.active { color: var(--primary); font-weight: bold; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
#toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 25px; border-radius: 12px; z-index: 10000; transition: 0.5s; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="toast"></div>

<div id="sub-overlay" style="position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 25px;">
    <div class="glass-card" style="text-align: center; width: 100%;">
        <div style="font-size: 40px; margin-bottom: 15px;">👑</div>
        <h3>نظام التحقق</h3>
        <p style="font-size: 12px; color: var(--text-dim); margin: 15px 0 25px;">اشترك في القناة لتفعيل الحساب واستلام الأرباح.</p>
        <button class="btn-start" style="width:100%; margin-bottom:10px; background:#0088cc;" onclick="window.open('https://t.me/Number433', '_blank')">اشترك الآن</button>
        <button class="btn-start" style="width:100%; background:transparent; border:1px solid var(--glass-border);" onclick="verifySub()">تحقق من الاشتراك</button>
    </div>
</div>

<div id="main-content" style="filter: blur(10px); pointer-events: none;">
    <header class="cool-header">
        <div class="logo-num433">NUM<b>433</b></div>
        <div class="user-status-card">
            <span class="online-dot"></span>
            <span id="u_name">تحميل...</span>
        </div>
    </header>

    <div id="p-home" class="page active">
        <div class="glass-card" style="text-align: center; background: linear-gradient(to bottom, rgba(92,95,245,0.1), transparent);">
            <p style="color: var(--text-dim); font-size: 11px;">الرصيد القابل للسحب</p>
            <div style="font-size: 42px; font-weight: 900; font-family: 'Poppins'; margin: 10px 0;">$<span id="balance">0.000</span></div>
        </div>

        <div class="adsgram-card">
            <button class="btn-start" id="adsgram-btn" onclick="runAdsGram()">ابدأ الآن</button>
            <div class="adsgram-info">
                <h3>مهام اليوم (AdsGram)</h3>
                <p>متبقي: <span id="ads-left">20</span> مهمة</p>
            </div>
        </div>

        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4 style="color: var(--accent); font-size: 14px;">رتبة الحساب: <span id="u-level">VIP 1</span></h4>
                <span id="reset-timer" style="font-size: 10px; color: var(--text-dim);">يتم التجديد تلقائياً</span>
            </div>
            <div style="height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;">
                <div id="level-bar" style="height: 100%; background: var(--primary); width: 0%;"></div>
            </div>
        </div>
    </div>

    <div id="p-tasks" class="page"></div>
    <div id="p-leaders" class="page"></div>
    <div id="p-refer" class="page"></div>
    <div id="p-wallet" class="page"></div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="showTab('p-home', this)">🏠<br>الرئيسية</button>
        <button class="nav-btn" onclick="showTab('p-tasks', this)">🎯<br>المهام</button>
        <button class="nav-btn" onclick="showTab('p-leaders', this)">🏆<br>المتصدرين</button>
        <button class="nav-btn" onclick="showTab('p-refer', this)">👥<br>الدعوات</button>
        <button class="nav-btn" onclick="showTab('p-wallet', this)">💰<br>المحفظة</button>
    </nav>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// بيانات المستخدم وتوقيت التجديد
let S = JSON.parse(localStorage.getItem('n433_v2')) || { 
    balance: 0.000, 
    adsGramCount: 0, 
    lastReset: Date.now(),
    isSubscribed: false 
};

// تهيئة AdsGram
const AdController = window.Adsgram.init({ blockId: "28510" });

function checkDailyReset() {
    const now = Date.now();
    const dayInMs = 24 * 60 * 60 * 1000;
    if (now - S.lastReset >= dayInMs) {
        S.adsGramCount = 0;
        S.lastReset = now;
        save();
    }
}

function runAdsGram() {
    if (S.adsGramCount >= 20) {
        showToast("⚠️ انتهت مهام AdsGram لليوم!");
        return;
    }

    AdController.show().then((result) => {
        S.balance += 0.005; // مكافأة الإعلان
        S.adsGramCount += 1;
        save();
        showToast("💰 تم إضافة المكافأة بنجاح!");
    }).catch((result) => {
        showToast("❌ لم يكتمل الإعلان");
    });
}

function verifySub() {
    S.isSubscribed = true;
    save();
    showToast("✅ تم التحقق بنجاح");
    setTimeout(() => location.reload(), 1000);
}

function save() { 
    localStorage.setItem('n433_v2', JSON.stringify(S)); 
    updateUI(); 
}

function updateUI() {
    checkDailyReset();
    document.getElementById('balance').innerText = S.balance.toFixed(3);
    const left = 20 - S.adsGramCount;
    document.getElementById('ads-left').innerText = left;
    
    const btn = document.getElementById('adsgram-btn');
    if (left <= 0) {
        btn.innerText = "اكتمل";
        btn.disabled = true;
    } else {
        btn.innerText = "ابدأ الآن";
        btn.disabled = false;
    }

    if (S.isSubscribed) {
        document.getElementById('sub-overlay').style.display = 'none';
        document.getElementById('main-content').style.filter = 'none';
        document.getElementById('main-content').style.pointerEvents = 'auto';
    }
}

function showTab(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.top = '20px';
    setTimeout(() => t.style.top = '-100px', 3000);
}

// البدء
document.getElementById('u_name').innerText = tg.initDataUnsafe?.user?.first_name || "Guest";
updateUI();
</script>

</body>
</html>
