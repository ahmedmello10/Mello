<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUM433 | MELLO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d1121;
            --card-bg: #1c2039;
            --primary-blue: #545cf1;
            --text-main: #ffffff;
            --text-dim: #8e94bb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header Logo Section */
        .header { text-align: center; margin-bottom: 30px; width: 100%; position: relative; }
        .lang-btn { 
            position: absolute; left: 0; top: 5px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim); padding: 4px 12px; border-radius: 12px; font-size: 10px;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: #5c6fff; }
        .logo-sub { font-size: 12px; color: #545cf1; font-weight: 800; margin-top: -5px; }

        /* Main Card Style */
        .card {
            background: var(--card-bg);
            width: 100%; border-radius: 40px;
            padding: 30px 20px; margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-label { color: var(--text-dim); font-size: 14px; margin-bottom: 15px; }

        /* Balance Text - Exactly like image */
        .balance {
            font-family: 'Montserrat', sans-serif;
            font-size: 58px; font-weight: 900;
            text-shadow: 0 0 30px rgba(92, 111, 255, 0.6);
            margin: 10px 0;
        }

        /* 3D Button - Exactly like image */
        .btn-main {
            background: var(--primary-blue);
            color: white; border: none; width: 100%;
            padding: 22px; border-radius: 28px;
            font-size: 18px; font-weight: 800;
            box-shadow: 0 10px 0 #3a42c4; /* الظل السفلي السميك */
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.1s; cursor: pointer;
            margin-top: 10px;
        }
        .btn-main:active { transform: translateY(6px); box-shadow: 0 4px 0 #3a42c4; }
        .btn-main:disabled { background: #33395a; box-shadow: 0 6px 0 #1e223a; opacity: 0.7; }

        /* Bottom Nav - Exactly like image */
        .nav {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: #161a2e; border-radius: 35px;
            display: flex; justify-content: space-around; padding: 15px 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .nav-item { 
            background: none; border: none; color: var(--text-dim);
            font-size: 11px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item.active { color: var(--primary-blue); }
        .nav-icon { font-size: 18px; }

        .page { display: none; width: 100%; }
        .page.active { display: block; }

    </style>
</head>
<body>

<div class="header">
    <button class="lang-btn">EN / AR</button>
    <div class="logo">NUM<span>433</span></div>
    <div class="logo-sub">🚀 . MELLO</div>
</div>

<div id="p-home" class="page active">
    <div class="card">
        <div class="card-label">الرصيد الحالي</div>
        <div class="balance">$<span id="bal-val">0.100</span></div>
    </div>

    <div class="card">
        <div class="card-label">كسب سريع من الإعلانات (<span id="ad-count">0</span>/10)</div>
        <button class="btn-main" id="watch-btn" onclick="playAd()">
            مشاهدة إعلان (0.05$) <span style="background:#ff9500; border-radius:5px; padding:2px;">▶️</span>
        </button>
    </div>
</div>

<nav class="nav">
    <button class="nav-item" onclick="showTab('p-refer')">
        <span class="nav-icon">👥</span> الدعوات
    </button>
    <button class="nav-item" onclick="showTab('p-tasks')">
        <span class="nav-icon">🎯</span> المهام
    </button>
    <button class="nav-item active" onclick="showTab('p-home')">
        <span class="nav-icon">🏠</span> الرئيسية
    </button>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 0.100;
    let ads = 0;

    function playAd() {
        if(ads >= 10) return;
        
        // محاكاة الإعلان
        const btn = document.getElementById('watch-btn');
        btn.disabled = true;
        
        show_10908620().then(() => {
            balance += 0.05;
            ads += 1;
            document.getElementById('bal-val').innerText = balance.toFixed(3);
            document.getElementById('ad-count').innerText = ads;
            btn.disabled = false;
            if(ads >= 10) btn.innerText = "عد غداً (10/10)";
        }).catch(() => {
            btn.disabled = false;
        });
    }

    function showTab(id) {
        // منطق التبديل البسيط
        tg.HapticFeedback.impactOccurred('light');
    }
</script>

</body>
</html>
