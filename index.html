<!DOCTYPE html>
<html lang="ar" dir="rtl" id="app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #5d5fef; --bg: #05070a; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        body { background: radial-gradient(circle at top, #1a1f35 0%, #05070a 100%); color: white; font-family: 'Tajawal', sans-serif; margin: 0; padding: 15px; min-height: 100vh; overflow-x: hidden; }

        /* نظام الإعلانات القديم (النافذة المنبثقة للعد التنازلي) */
        .ad-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .timer-circle { width: 100px; height: 100px; border: 5px solid var(--main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 0 20px var(--main); }

        /* ستايل Finova */
        .main-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 35px; padding: 40px 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .balance-val { font-family: 'Inter', sans-serif; font-size: 55px; font-weight: 900; margin: 10px 0; background: linear-gradient(180deg, #fff 30%, #5d5fef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* نظام السحب (بينانس ودولار) */
        .withdraw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .method { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; }
        .method img { width: 50px; margin-bottom: 8px; }

        .btn-earn { width: 100%; background: var(--main); border: none; padding: 20px; border-radius: 22px; color: white; font-size: 20px; font-weight: 900; margin-top: 20px; box-shadow: 0 10px 20px rgba(93, 95, 239, 0.3); cursor: pointer; }
    </style>
</head>
<body>

    <button onclick="toggleLang()" style="background:var(--glass); color:white; border:1px solid var(--border); padding:5px 15px; border-radius:10px; margin-bottom:10px;" id="lBtn">English</button>

    <div class="main-card">
        <div id="tTotal" style="color:#8e94a8; font-weight:bold">إجمالي الرصيد</div>
        <div class="balance-val" id="balance">$0.100</div>
        <div style="display:flex; justify-content:center; gap:20px; font-size:12px;">
            <div><span id="tAds">إعلانات:</span> <span style="color:var(--main)">2/10</span></div>
            <div><span id="tProfit">ربح اليوم:</span> <span style="color:var(--main)">$0.10</span></div>
        </div>
    </div>

    <button class="btn-earn" onclick="startOldAdSystem()" id="bEarn">كسب سريع ($0.05)</button>

    <div style="margin-top:30px; font-weight:900; color:#8e94a8;" id="tWith">وسائل السحب المتاحة</div>
    <div class="withdraw-grid">
        <div class="method"><img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png"><div>Binance</div></div>
        <div class="method"><img src="https://cryptologos.cc/logos/tether-usdt-logo.png"><div>USDT</div></div>
    </div>

    <div id="adOverlay" class="ad-overlay">
        <div id="adSpace" style="margin-bottom: 20px; color: #5d5fef; font-weight: bold;">جاري تحميل إعلانك الخاص...</div>
        <div class="timer-circle" id="timer">15</div>
        <p id="adNotice">يرجى الانتظار للحصول على المكافأة</p>
        <button id="collectBtn" onclick="collectReward()" style="display:none; background:#28a745; color:white; border:none; padding:15px 30px; border-radius:15px; font-weight:bold;">تأكيد المشاهدة وحصد الربح</button>
    </div>

    <script>
        let balance = 0.100;
        let timeLeft = 15;
        let timerId;

        // نظام الإعلانات القديم بالعد التنازلي
        function startOldAdSystem() {
            document.getElementById('adOverlay').style.display = 'flex';
            timeLeft = 15;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('collectBtn').style.display = 'none';
            document.getElementById('adNotice').style.display = 'block';

            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    document.getElementById('adNotice').style.display = 'none';
                    document.getElementById('collectBtn').style.display = 'block';
                }
            }, 1000);
        }

        function collectReward() {
            balance += 0.05;
            document.getElementById('balance').innerText = "$" + balance.toFixed(3);
            document.getElementById('adOverlay').style.display = 'none';
            alert("تمت إضافة $0.05 لرصيدك بنجاح!");
        }

        function toggleLang() {
            let h = document.getElementById('app');
            let isAr = h.dir == "rtl";
            h.dir = isAr ? "ltr" : "rtl";
            document.getElementById('lBtn').innerText = isAr ? "العربية" : "English";
            document.getElementById('tTotal').innerText = isAr ? "TOTAL BALANCE" : "إجمالي الرصيد";
            document.getElementById('bEarn').innerText = isAr ? "Quick Earn ($0.05)" : "كسب سريع ($0.05)";
            // تكملة الترجمة...
        }
    </script>
</body>
</html>
