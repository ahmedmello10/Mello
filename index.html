<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number 433 Premium Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #070810;
            --primary: #5c5ff5;
            --primary-glow: rgba(92, 95, 245, 0.4);
            --accent: #c9a84c;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dim: #9499c3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1a1c3d, #070810);
            color: white; font-family: 'Tajawal', sans-serif;
            min-height: 100vh; padding: 20px 15px 120px;
            direction: rtl;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 25px 20px; margin-bottom: 20px;
        }

        .balance-val { font-family: 'Syne', sans-serif; font-size: 45px; font-weight: 800; text-align: center; text-shadow: 0 0 25px var(--primary-glow); }

        .btn-action {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 18px; border-radius: 18px; font-weight: 900; font-size: 16px;
            cursor: pointer; box-shadow: 0 8px 20px var(--primary-glow); transition: 0.2s;
        }
        .btn-action:disabled { background: #2a2d4a; box-shadow: none; opacity: 0.6; cursor: not-allowed; }

        .input-style {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 15px; color: white; font-family: 'Tajawal'; margin-top: 10px; margin-bottom: 15px;
        }

        /* Task Cards */
        .task-card {
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border);
        }

        .nav-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(20, 22, 45, 0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            display: flex; justify-content: space-around; padding: 10px; z-index: 1000;
        }
        .nav-btn { color: var(--text-dim); background: none; border: none; font-size: 11px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); font-weight: 900; transform: translateY(-3px); }

        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #timer-box { text-align: center; padding: 30px; display: none; }
        .countdown { font-family: 'Syne'; font-size: 30px; color: var(--accent); margin-top: 10px; }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 25px; border-radius: 15px;
            z-index: 2000; transition: 0.5s; font-weight: bold;
        }
        #toast.show { top: 30px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
    <h2 style="font-family:'Syne'; letter-spacing:-1px;">NUM<span style="color:var(--primary)">433</span></h2>
    <div style="background:var(--glass); padding:5px 15px; border-radius:50px; font-size:12px; border:1px solid var(--glass-border);">
        🟢 <span id="u_name">تحميل...</span>
    </div>
</div>

<div id="p-home" class="page active">
    <div class="glass-card">
        <p style="text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:10px;">إجمالي الرصيد</p>
        <div class="balance-val">$<span id="balance">0.000</span></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; text-align: center; font-size: 11px;">
                مهام اليوم: <b id="today_ads">0</b>/10
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; text-align: center; font-size: 11px;">
                إجمالي الربح: <b id="total_earned">$0.00</b>
            </div>
        </div>
    </div>
    
    <div class="glass-card" style="border-color: var(--primary);">
        <h4>نظام المستويات</h4>
        <p style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">أكمل المهام يومياً لرفع مستواك وزيادة أرباحك.</p>
    </div>
</div>

<div id="p-tasks" class="page">
    <h3 style="margin-bottom: 20px;">المهام اليومية</h3>
    
    <div id="tasks-container">
        </div>

    <div id="timer-box">
        <div style="font-size: 50px;">⏳</div>
        <p>انتهت مهام اليوم!</p>
        <p style="font-size: 12px; color: var(--text-dim);">تتجدد المهام تلقائياً خلال:</p>
        <div class="countdown" id="countdown-timer">00:00:00</div>
    </div>
</div>

<div id="p-refer" class="page">
    <div class="glass-card">
        <h4 style="color:var(--accent)">نظام المكافآت</h4>
        <p style="font-size: 12px; color: var(--text-dim); margin: 10px 0;">اربح $0.10 عن كل شخص تدعوه.</p>
        <div id="ref-link" style="font-size:11px; word-break:break-all; color:var(--primary); background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; margin-bottom:15px; text-align: center;"></div>
        <button class="btn-action" onclick="copyRef()">نسخ رابط الدعوة</button>
    </div>
</div>

<div id="p-wallet" class="page">
    <h3 style="margin-bottom:20px;">سحب الأرباح</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <div class="glass-card" onclick="selectPay('Binance Pay')" style="cursor:pointer; text-align:center; padding:15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Binance_Logo.svg" width="30">
            <p style="font-size:12px; margin-top:5px;">Binance</p>
        </div>
        <div class="glass-card" onclick="selectPay('USDT (TRC20)')" style="cursor:pointer; text-align:center; padding:15px;">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="30">
            <p style="font-size:12px; margin-top:5px;">USDT</p>
        </div>
    </div>

    <div id="w-form" class="glass-card" style="display:none;">
        <p id="pay-method" style="color:var(--primary); font-weight:bold; margin-bottom:15px;"></p>
        <label style="font-size:12px; color:var(--text-dim)">العنوان / ID</label>
        <input type="text" id="w-addr" class="input-style" placeholder="أدخل بياناتك هنا...">
        <label style="font-size:12px; color:var(--text-dim)">المبلغ ($10 كحد أدنى)</label>
        <input type="number" id="w-amnt" class="input-style" placeholder="10.00">
        <button class="btn-action" onclick="submitWithdraw()">تأكيد السحب</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showTab('p-home', this)">🏠<br>الرئيسية</button>
    <button class="nav-btn" onclick="showTab('p-tasks', this)">🎯<br>المهام</button>
    <button class="nav-btn" onclick="showTab('p-refer', this)">👥<br>الدعوات</button>
    <button class="nav-btn" onclick="showTab('p-wallet', this)">💰<br>المحفظة</button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let S = JSON.parse(localStorage.getItem('n433_v3')) || {
    balance: 0.000,
    adsToday: 0,
    totalEarned: 0.00,
    lastReset: new Date().toLocaleDateString()
};

// فحص التجديد التلقائي كل يوم
function checkDailyReset() {
    const today = new Date().toLocaleDateString();
    if (S.lastReset !== today) {
        S.adsToday = 0;
        S.lastReset = today;
        save();
    }
}

function save() {
    localStorage.setItem('n433_v3', JSON.stringify(S));
    updateUI();
}

function updateUI() {
    document.getElementById('balance').innerText = S.balance.toFixed(3);
    document.getElementById('today_ads').innerText = S.adsToday;
    document.getElementById('total_earned').innerText = "$" + S.totalEarned.toFixed(2);
    
    renderTasks();
}

function renderTasks() {
    const container = document.getElementById('tasks-container');
    const timerBox = document.getElementById('timer-box');
    
    if (S.adsToday >= 10) {
        container.style.display = 'none';
        timerBox.style.display = 'block';
        startCountdown();
    } else {
        container.style.display = 'block';
        timerBox.style.display = 'none';
        let html = '';
        for (let i = S.adsToday + 1; i <= 10; i++) {
            html += `
            <div class="task-card">
                <div><b>مهمة #${i}</b><br><small style="color:var(--primary)">+$0.05</small></div>
                <button class="btn-action" style="width:auto; padding:8px 20px; font-size:12px;" onclick="playAd(this)">ابدأ</button>
            </div>`;
        }
        container.innerHTML = html;
    }
}

function playAd(btn) {
    btn.disabled = true;
    btn.innerText = "جاري...";
    
    show_10908620().then(() => {
        S.balance += 0.050;
        S.totalEarned += 0.050;
        S.adsToday += 1;
        save();
        showToast("💰 مبروك! ربحت $0.05");
    }).catch(() => {
        btn.disabled = false;
        btn.innerText = "ابدأ";
        showToast("⚠️ يجب إكمال المشاهدة");
    });
}

function startCountdown() {
    const timerDisplay = document.getElementById('countdown-timer');
    function update() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const diff = tomorrow - now;
        
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        
        timerDisplay.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    setInterval(update, 1000);
    update();
}

// Wallet Functions (Old Style)
function selectPay(m) {
    document.getElementById('w-form').style.display = 'block';
    document.getElementById('pay-method').innerText = "سحب عبر: " + m;
}

function submitWithdraw() {
    const amnt = document.getElementById('w-amnt').value;
    if(amnt < 10) return showToast("⚠️ الحد الأدنى للسحب $10");
    if(amnt > S.balance) return showToast("⚠️ رصيدك غير كافٍ");
    showToast("✅ تم إرسال طلب السحب");
}

function showTab(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function copyRef() {
    navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
    showToast("🔗 تم نسخ الرابط!");
}

// Init
const user = tg.initDataUnsafe?.user;
document.getElementById('u_name').innerText = user?.first_name || "Guest";
document.getElementById('ref-link').innerText = `https://t.me/Number433bot?start=${user?.id || '000000'}`;

checkDailyReset();
updateUI();
</script>
</body>
</html>
