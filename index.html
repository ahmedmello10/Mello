<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number 433 Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>
    
    <style>
        :root {
            --bg-color: #0b0e1f;
            --card-color: #161a33;
            --primary: #3b37ff;
            --secondary: #10b981;
            --text-dim: #8e92b2;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; margin: 0; padding: 20px 20px 100px 20px; direction: rtl; }

        /*Header*/
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .user-info div { font-weight: bold; font-size: 1.1rem; }
        .user-info span { color: var(--text-dim); font-size: 0.8rem; }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; }

        /*Balance Card*/
        .balance-card {
            background: var(--primary); border-radius: 24px; padding: 25px;
            text-align: center; box-shadow: 0 8px 25px rgba(59, 55, 255, 0.2); margin-bottom: 30px;
        }
        .balance-card .amount { font-size: 3rem; font-weight: 800; margin: 10px 0; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .stats-row div span { display: block; font-size: 0.7rem; opacity: 0.7; }

        /*Tabs*/
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        /*Tasks & Buttons*/
        .section-title { font-size: 1.1rem; margin-bottom: 15px; display: block; }
        .item-card { background: var(--card-color); border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #24294d; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 10px 22px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /*Refer Page*/
        .refer-box { background: var(--secondary); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .link-display { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; font-size: 0.8rem; word-break: break-all; margin: 10px 0; }

        /*Navigation*/
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #161a33; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #24294d; }
        .nav-item { color: var(--text-dim); border: none; background: none; font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <div id="display-name">Loading...</div>
            <span id="display-id">ID: 00000000</span>
        </div>
        <div class="avatar"></div>
    </div>

    <div id="home-tab" class="tab-content active">
        <div class="balance-card">
            <span style="font-size: 0.9rem;">إجمالي الرصيد المتاح</span>
            <div class="amount">$<span id="balance">0.000</span></div>
            <div class="stats-row">
                <div><b id="withdrawn-val">$0.00</b><span>المسحوب</span></div>
                <div><b id="ads-val">0</b><span>إعلانات</span></div>
                <div><b id="ref-val">0</b><span>دعوات</span></div>
            </div>
        </div>
        <span class="section-title">ربح سريع</span>
        <div class="item-card">
            <div>مشاهدة إعلان عشوائي<br><small style="color:var(--secondary)">+$0.05</small></div>
            <button class="btn-action" onclick="playAd(0.05)">مشاهدة</button>
        </div>
    </div>

    <div id="tasks-tab" class="tab-content">
        <span class="section-title">المهام اليومية</span>
        <div id="tasks-list"></div>
    </div>

    <div id="refer-tab" class="tab-content">
        <div class="refer-box">
            <b>ادعُ أصدقاءك واكسب مكافأة عن كل انضمام!</b>
        </div>
        <span style="color:var(--text-dim); font-size: 0.8rem;">رابط الإحالة الخاص بك:</span>
        <div class="link-display" id="ref-link">https://t.me/Number433bot?start=...</div>
        <button class="btn-action" style="width:100%" onclick="copyLink()">نسخ الرابط</button>
    </div>

    <div id="wallet-tab" class="tab-content">
        <span class="section-title">اختر طريقة السحب</span>
        <div class="item-card" style="border-color:var(--primary)">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Binance_Logo.svg" width="30">
            <div>Binance Pay</div>
            <span>✔️</span>
        </div>
        <div class="item-card" style="border-color:var(--primary)">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="30">
            <div>USDT (TRC20)</div>
            <span>✔️</span>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="showTab('home-tab', this)">🏠<br>الرئيسية</button>
        <button class="nav-item" onclick="showTab('tasks-tab', this)">📋<br>المهام</button>
        <button class="nav-item" onclick="showTab('refer-tab', this)">👥<br>الدعوات</button>
        <button class="nav-item" onclick="showTab('wallet-tab', this)">💰<br>المحفظة</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // سحب بيانات المستخدم الحقيقية
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || "6619233998";
        const userName = user?.first_name || "MELLO";
        
        document.getElementById('display-name').innerText = userName + " 👋";
        document.getElementById('display-id').innerText = "ID: " + userId;
        document.getElementById('ref-link').innerText = `https://t.me/Number433bot?start=${userId}`;

        let balance = 0.000;
        let adsCount = 0;

        // --- نظام الإعلانات التلقائي ---
        // 1. أول إعلان بعد 5 ثوانٍ
        setTimeout(() => {
            show_10908620({ type: 'inApp', inAppSettings: { timeout: 0, everyPage: true } });
        }, 5000);

        // 2. تكرار الإعلان كل 5 دقائق (300000 ميلي ثانية)
        setInterval(() => {
            show_10908620({ type: 'inApp', inAppSettings: { timeout: 0, everyPage: true } });
        }, 300000);

        // تشغيل إعلان المكافأة (الزرار)
        function playAd(reward) {
            show_10908620().then(() => {
                balance += reward;
                adsCount++;
                document.getElementById('balance').innerText = balance.toFixed(3);
                document.getElementById('ads-val').innerText = adsCount;
            });
        }

        // توليد المهام
        const list = document.getElementById('tasks-list');
        for(let i=1; i<=10; i++) {
            list.innerHTML += `
                <div class="item-card">
                    <div>مهمة رقم ${i}<br><small style="color:var(--secondary)">+$0.10</small></div>
                    <button class="btn-action" onclick="this.disabled=true; this.innerText='تم'; playAd(0.10)">ابدأ</button>
                </div>`;
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function copyLink() {
            const link = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(link);
            alert("تم نسخ رابط الدعوة الخاص بك");
        }
    </script>
</body>
</html>
