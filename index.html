<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d111d;
            --card-bg: #161b33;
            --main-blue: #5d5fef;
            --text-main: #ffffff;
            --text-dim: #8e94a8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* خانة تبديل اللغة */
        .lang-switch {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .lang-btn {
            background: var(--card-bg);
            border: 1px solid #252b45;
            color: white;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        /* مساحة الإعلانات */
        .ad-space {
            width: 100%;
            background: rgba(93, 95, 239, 0.1);
            border: 1px dashed var(--main-blue);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-dim);
        }

        /* بطاقة الرصيد */
        .balance-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #252b45;
        }

        .main-balance { font-size: 50px; font-weight: 900; margin: 10px 0; }

        .stats-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
        .stat-card { background: #1c223d; flex: 1; padding: 12px; border-radius: 15px; font-size: 13px; }

        /* زر كسب سريع */
        .earn-btn {
            background: var(--main-blue);
            color: white;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            padding: 20px;
            border-radius: 22px;
            border: none;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 6px 0px #3d3f9e;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .earn-btn:active { transform: translateY(3px); box-shadow: 0 3px 0px #3d3f9e; }

        /* السحب */
        .withdraw-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        .method-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 22px;
            text-align: center;
            border: 1px solid #252b45;
        }
        .method-box img { width: 45px; margin-bottom: 10px; }

        /* الناف بار */
        .nav-bar {
            position: fixed; bottom: 20px;
            width: 90%; max-width: 400px;
            background: #1a1f35;
            display: flex; justify-content: space-around;
            padding: 15px; border-radius: 25px;
            border: 1px solid #2d3550;
        }
        .nav-link { color: var(--text-dim); text-decoration: none; font-size: 13px; }
        .nav-link.active { color: var(--main-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">English</button>
    </div>

    <div class="ad-space" id="adText">إعلانك هنا: تابع قناتنا للحصول على هدايا!</div>

    <div class="balance-container">
        <div class="label" id="balanceLabel">إجمالي الرصيد</div>
        <div class="main-balance">$0.100</div>
        <div class="stats-row">
            <div class="stat-card" id="statAds">إعلانات اليوم: 2/10</div>
            <div class="stat-card" id="statProfit">إجمالي الربح: $0.10</div>
        </div>
    </div>

    <button class="earn-btn">
        <span style="background:white; color:var(--main-blue); padding:0 6px; border-radius:4px;">▶</span>
        <span id="earnText">كسب سريع ($0.05)</span>
    </button>

    <div style="width:100%; text-align:start; margin:25px 0 10px; color:var(--text-dim); font-weight:bold;" id="withdrawTitle">طرق السحب:</div>
    
    <div class="withdraw-grid">
        <div class="method-box">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png">
            <div>Binance</div>
        </div>
        <div class="method-box">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
            <div>USDT</div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-link active" id="navHome">الرئيسية</a>
        <a href="#" class="nav-link" id="navTasks">المهام</a>
        <a href="#" class="nav-link" id="navFriends">الأصدقاء</a>
        <a href="#" class="nav-link" id="navRank">الترتيب</a>
    </div>

    <script>
        let currentLang = 'ar';
        function toggleLang() {
            const html = document.getElementById('mainHtml');
            if (currentLang === 'ar') {
                // تحويل للإنجليزي
                html.dir = 'ltr';
                html.lang = 'en';
                document.getElementById('langBtn').innerText = 'العربية';
                document.getElementById('balanceLabel').innerText = 'Total Balance';
                document.getElementById('statAds').innerText = 'Ads Today: 2/10';
                document.getElementById('statProfit').innerText = 'Total Profit: $0.10';
                document.getElementById('earnText').innerText = 'Quick Earn ($0.05)';
                document.getElementById('withdrawTitle').innerText = 'Withdrawal Methods:';
                document.getElementById('navHome').innerText = 'Home';
                document.getElementById('navTasks').innerText = 'Tasks';
                document.getElementById('navFriends').innerText = 'Friends';
                document.getElementById('navRank').innerText = 'Rank';
                document.getElementById('adText').innerText = 'Your Ad: Follow us for rewards!';
                currentLang = 'en';
            } else {
                // العودة للعربي
                html.dir = 'rtl';
                html.lang = 'ar';
                document.getElementById('langBtn').innerText = 'English';
                document.getElementById('balanceLabel').innerText = 'إجمالي الرصيد';
                document.getElementById('statAds').innerText = 'إعلانات اليوم: 2/10';
                document.getElementById('statProfit').innerText = 'إجمالي الربح: $0.10';
                document.getElementById('earnText').innerText = 'كسب سريع ($0.05)';
                document.getElementById('withdrawTitle').innerText = 'طرق السحب:';
                document.getElementById('navHome').innerText = 'الرئيسية';
                document.getElementById('navTasks').innerText = 'المهام';
                document.getElementById('navFriends').innerText = 'الأصدقاء';
                document.getElementById('navRank').innerText = 'الترتيب';
                document.getElementById('adText').innerText = 'إعلانك هنا: تابع قناتنا للحصول على هدايا!';
                currentLang = 'ar';
            }
        }
    </script>
</body>
</html>
