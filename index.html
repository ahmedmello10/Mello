<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number 433 Bot - Earning</title>
    <script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>
    <style>
        :root { --primary: #3b37ff; --bg: #0f1123; --card: #1a1c3a; --text-dim: #888; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px 20px 100px 20px; direction: rtl; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* كروت الإحصائيات والرصيد */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2d4a; }
        .balance-card { background: var(--primary); }
        .big-number { font-size: 2.2rem; font-weight: bold; margin: 10px 0; }
        
        /* ستايل أزرار المهام */
        .task-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #2a2d4a; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-task { background: #2a2d4a; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .btn-task.done { opacity: 0.5; cursor: default; background: #111; }

        /* صفحة السحب (Wallet) */
        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .method-item { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .method-item.selected { border-color: var(--primary); }
        .method-item img { width: 40px; margin-bottom: 10px; }

        /* شريط التنقل */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2a2d4a; z-index: 100; }
        .nav-item { color: var(--text-dim); text-decoration: none; font-size: 0.75rem; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="home" class="tab-content active">
        <h3>أهلاً بك في Number 433 👋</h3>
        <div class="card balance-card">
            <div style="opacity: 0.9;">إجمالي الرصيد</div>
            <div class="big-number">$<span id="main-balance">1.310</span></div>
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span>المسحوب: $0.000</span>
                <span>الإحالات: 0</span>
            </div>
        </div>
        <button class="btn-main" onclick="watchAdMain()">▶️ شاهد إعلان واكسب ($0.05)</button>
    </div>

    <div id="tasks" class="tab-content">
        <h3>المهام اليومية</h3>
        <div id="task-container">
            </div>
    </div>

    <div id="refer" class="tab-content">
        <h3>دعوة الأصدقاء</h3>
        <div class="card" style="background: linear-gradient(135deg, #10b981, #059669);">
            <p>اكسب عمولة عن كل صديق ينضم للبوت عن طريقك!</p>
        </div>
        <div style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 5px;">رابط الإحالة الخاص بك:</div>
        <div class="card" id="ref-url" style="font-size: 0.8rem; word-break: break-all;">https://t.me/Number433bot?start=user123</div>
        <button class="btn-main" onclick="copyRef()">نسخ الرابط</button>
    </div>

    <div id="wallet" class="tab-content">
        <h3>سحب الأرباح</h3>
        <div class="method-grid">
            <div class="method-item selected">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Binance_Logo.svg" alt="Binance">
                <div>Binance</div>
            </div>
            <div class="method-item selected">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="USDT">
                <div>USDT</div>
            </div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <input type="text" placeholder="أدخل Binance ID أو عنوان USDT" style="width:100%; background:none; border:none; color:white; outline:none;">
        </div>
        <button class="btn-main" onclick="alert('سيتم معالجة الطلب عند وصولك للحد الأدنى $5')">سحب الآن</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home', this)">🏠<br>الرئيسية</div>
        <div class="nav-item" onclick="switchTab('tasks', this)">📋<br>المهام</div>
        <div class="nav-item" onclick="switchTab('refer', this)">👥<br>الدعوات</div>
        <div class="nav-item" onclick="switchTab('wallet', this)">💰<br>المحفظة</div>
    </div>

    <script>
        let balance = 1.310;

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // توليد المهام
        const container = document.getElementById('task-container');
        for(let i=1; i<=10; i++) {
            container.innerHTML += `
                <div class="task-item">
                    <div>مهمة رقم ${i} <br><small style="color:var(--primary)">+$0.10</small></div>
                    <button class="btn-task" onclick="doTask(this)">ابدأ</button>
                </div>
            `;
        }

        function watchAdMain() {
            show_10908620({ type: 'inApp', inAppSettings: { timeout: 0, everyPage: true } });
            balance += 0.05;
            document.getElementById('main-balance').innerText = balance.toFixed(3);
        }

        function doTask(btn) {
            show_10908620({ type: 'inApp', inAppSettings: { timeout: 0, everyPage: true } });
            btn.innerText = "جاري...";
            setTimeout(() => {
                btn.innerText = "تم ✅";
                btn.disabled = true;
                btn.classList.add('done');
                balance += 0.10;
                document.getElementById('main-balance').innerText = balance.toFixed(3);
            }, 5000);
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('ref-url').innerText);
            alert("تم نسخ رابط الدعوة الخاص بك!");
        }
    </script>
</body>
</html>
