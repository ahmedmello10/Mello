<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number 433 Premium</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #05060e;
  --primary: #5c5ff5;
  --primary-glow: rgba(92, 95, 245, 0.4);
  --accent: #c9a84c;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text: #ffffff;
  --text-dim: #9499c3;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background-color: var(--bg);
  background-image: radial-gradient(circle at top right, #16183d, #05060e);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  padding: 20px 15px 120px;
  overflow-x: hidden;
}

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 5px; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -1px; }
.logo span { color: var(--primary); }
.user-pill { background: var(--glass); border: 1px solid var(--glass-border); padding: 5px 12px; border-radius: 50px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
.dot { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }

/* Dashboard Card */
.main-card {
  background: linear-gradient(145deg, rgba(92,95,245,0.15) 0%, rgba(0,0,0,0) 100%);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 32px; padding: 30px 20px;
  margin-bottom: 25px; text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.balance-label { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; display: block; letter-spacing: 1px; }
.balance-val { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; text-shadow: 0 0 20px var(--primary-glow); }

/* Quick Actions */
.grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
.stat-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 20px; text-align: center; }
.stat-box span { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 5px; }
.stat-box b { font-family: 'Syne', sans-serif; color: var(--accent); }

/* Buttons */
.btn-premium {
  background: var(--primary); color: white; border: none; width: 100%;
  padding: 18px; border-radius: 20px; font-weight: 900; font-size: 16px;
  cursor: pointer; box-shadow: 0 10px 20px var(--primary-glow);
  transition: transform 0.2s;
}
.btn-premium:active { transform: scale(0.97); }

/* Withdrawal Section - Real UI */
.withdraw-form {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 20px; margin-top: 20px;
  display: none; animation: slideIn 0.3s ease;
}
.input-group { margin-bottom: 15px; }
.input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.input-group input {
  width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
  padding: 14px; border-radius: 12px; color: white; font-family: 'Tajawal';
}

/* Nav Bar */
.nav-bar {
  position: fixed; bottom: 25px; left: 15px; right: 15px;
  background: rgba(20, 22, 45, 0.85); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: 25px;
  display: flex; justify-content: space-around; padding: 10px; z-index: 1000;
}
.nav-btn { color: var(--text-dim); background: none; border: none; padding: 10px; font-size: 11px; cursor: pointer; transition: 0.3s; }
.nav-btn.active { color: var(--primary); font-weight: 900; transform: translateY(-5px); }

/* General */
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>

<div class="header">
    <div class="logo">NUM<span>433</span></div>
    <div class="user-pill"><div class="dot"></div> <span id="u_name">Loading...</span></div>
</div>

<div id="p-home" class="page active">
    <div class="main-card">
        <span class="balance-label">رصيدك الحالي</span>
        <div class="balance-val">$<span id="balance">0.000</span></div>
    </div>

    <div class="grid-stats">
        <div class="stat-box"><span>الإعلانات</span><b id="st-ads">0</b></div>
        <div class="stat-box"><span>الإحالات</span><b id="st-ref">0</b></div>
    </div>

    <button class="btn-premium" onclick="runRewardedAd()">▶️ كسب سريع ($0.10)</button>

    <div style="margin-top: 30px;">
        <h4 style="margin-bottom: 15px; font-size: 14px;">مهام الفيديو اليومية</h4>
        <div id="tasks-container"></div>
    </div>
</div>

<div id="p-wallet" class="page">
    <h3 style="margin-bottom: 20px;">سحب الأرباح</h3>
    <div class="grid-stats" style="grid-template-columns: 1fr;">
        <div class="stat-box" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="openWithdraw('Binance Pay')">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Binance_Logo.svg" width="25">
                <b>Binance Pay</b>
            </div>
            <span>إختر ❯</span>
        </div>
        <div class="stat-box" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="openWithdraw('USDT (TRC20)')">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="25">
                <b>USDT (TRC20)</b>
            </div>
            <span>إختر ❯</span>
        </div>
    </div>

    <div id="withdraw-form" class="withdraw-form">
        <h4 id="selected-method" style="color:var(--primary); margin-bottom:15px;"></h4>
        <div class="input-group">
            <label>عنوان المحفظة أو Binance ID</label>
            <input type="text" id="w-address" placeholder="أدخل العنوان هنا...">
        </div>
        <div class="input-group">
            <label>المبلغ المراد سحبه (بحد أدنى $10)</label>
            <input type="number" id="w-amount" placeholder="0.00">
        </div>
        <button class="btn-premium" onclick="processWithdraw()">تأكيد طلب السحب</button>
    </div>
</div>

<div id="p-refer" class="page">
    <div class="main-card" style="background: linear-gradient(145deg, rgba(201,168,76,0.1), transparent);">
        <b style="color:var(--accent); font-size:18px;">نظام الإحالة الملكي</b>
        <p style="font-size:12px; color:var(--text-dim); margin-top:10px;">انسخ رابطك وشاركه مع أصدقائك، واكسب عمولة فورية عن كل صديق يبدأ العمل!</p>
    </div>
    <div class="stat-box" style="text-align:right;">
        <span style="margin-bottom:10px;">رابط الدعوة الخاص بك:</span>
        <div id="ref-link" style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; font-size:11px; word-break:break-all; color:var(--primary);">...</div>
        <button class="btn-premium" style="margin-top:15px; padding:12px;" onclick="copyRef()">نسخ الرابط</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showTab('p-home', this)">🏠<br>الرئيسية</button>
    <button class="nav-btn" onclick="showTab('p-refer', this)">👥<br>الدعوات</button>
    <button class="nav-btn" onclick="showTab('p-wallet', this)">💰<br>المحفظة</button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// بيانات تليجرام
const user = tg.initDataUnsafe?.user;
document.getElementById('u_name').innerText = user?.first_name || "Guest";
const refLink = `https://t.me/Number433bot?start=${user?.id || '6619233998'}`;
document.getElementById('ref-link').innerText = refLink;

let balance = 0.000;
let ads = 0;

// نظام الإعلانات التلقائي
setTimeout(() => { show_10908620({ type: 'inApp', inAppSettings: { timeout: 0, everyPage: true } }); }, 5000);
setInterval(() => { show_10908620({ type: 'inApp', inAppSettings: { timeout: 0, everyPage: true } }); }, 300000);

function runRewardedAd() {
    show_10908620().then(() => {
        balance += 0.10;
        ads++;
        updateUI();
        alert("💰 تمت إضافة $0.10 إلى رصيدك!");
    });
}

function updateUI() {
    document.getElementById('balance').innerText = balance.toFixed(3);
    document.getElementById('st-ads').innerText = ads;
}

// توليد المهام بشكل احترافي
const tasksBox = document.getElementById('tasks-container');
for(let i=1; i<=10; i++) {
    tasksBox.innerHTML += `
    <div class="stat-box" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="text-align:right;">
            <b style="font-size:14px;">مهمة فيديو #${i}</b>
            <span style="color:#00ff88;">+$0.050</span>
        </div>
        <button class="btn-premium" style="width:auto; padding:8px 20px; font-size:12px;" onclick="this.disabled=true; this.innerText='تم'; runRewardedAd()">ابدأ</button>
    </div>`;
}

// منطق السحب الجديد
function openWithdraw(method) {
    document.getElementById('withdraw-form').style.display = 'block';
    document.getElementById('selected-method').innerText = "سحب عبر: " + method;
    window.scrollTo(0, document.body.scrollHeight);
}

function processWithdraw() {
    const addr = document.getElementById('w-address').value;
    const amnt = document.getElementById('w-amount').value;
    if(!addr || amnt < 10) {
        alert("⚠️ يرجى التأكد من العنوان وأن المبلغ لا يقل عن $10");
    } else {
        alert("✅ تم إرسال طلب السحب بنجاح! سيتم المراجعة خلال 24 ساعة.");
    }
}

function showTab(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    document.getElementById('withdraw-form').style.display = 'none'; // ريسيت للفورم
}

function copyRef() {
    navigator.clipboard.writeText(refLink);
    alert("🔗 تم نسخ رابط الدعوة!");
}
</script>
</body>
</html>
