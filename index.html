<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number 433 Elite - Professional Edition</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* نفس CSS بتاعك بدون تغيير */
:root {
  --bg: #070912;
  --primary: #5c5ff5;
  --accent: #c9a84c;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-dim: #8489b2;
  --green: #4dff88;
  --red: #ff4d4d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: white; font-family: 'Tajawal'; padding: 10px 15px 120px; }

/* باقي التنسيق زي ما هو... */
.task-card{background:rgba(255,255,255,0.05);padding:15px;border-radius:20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.btn-action{background:var(--primary);color:#fff;border:none;padding:10px 15px;border-radius:10px}
.glass-card{background:var(--glass);padding:15px;border-radius:20px;margin-bottom:10px}
</style>
</head>

<body>

<h2>الرصيد: $<span id="balance">0.000</span></h2>

<div class="glass-card">
<h3>🎯 المهام اليومية</h3>
<div id="tasks-list"></div>
</div>

<!-- ⚡ الكسب السريع -->
<div id="fast-box"></div>

<script>
let S = JSON.parse(localStorage.getItem('n433_pro')) || {
balance:0,
adsToday:0,
fastAds:0,
lastReset:Date.now()
};

// reset كل 24 ساعة
function checkReset(){
if(Date.now()-S.lastReset>86400000){
S.adsToday=0;
S.fastAds=0;
S.lastReset=Date.now();
}
}
checkReset();

function save(){
localStorage.setItem('n433_pro',JSON.stringify(S));
updateUI();
}

function updateUI(){
document.getElementById('balance').innerText=S.balance.toFixed(3);

// المهام
let h="";
if(S.adsToday>=10){
h="✅ انتهت المهام";
}else{
for(let i=S.adsToday+1;i<=10;i++){
h+=`<div class="task-card">
<span>اعلان ${i}</span>
<button class="btn-action" onclick="doTask()">ابدأ</button>
</div>`;
}
}
document.getElementById('tasks-list').innerHTML=h;

// ⚡ الكسب السريع
let f="";
if(S.fastAds>=20){
f=`<div class="glass-card">⚡ انتهى الكسب اليوم</div>`;
}else{
f=`<div class="glass-card">
<h3>⚡ الكسب السريع</h3>
<p>${S.fastAds}/20 اعلان</p>
<button class="btn-action" onclick="fastAd()">مشاهدة اعلان</button>
</div>`;
}
document.getElementById('fast-box').innerHTML=f;
}

// اعلان عادي
function doTask(){
show_10908620().then(()=>{
S.balance+=0.01;
S.adsToday++;
save();
});
}

// اعلان سريع
function fastAd(){
show_10908620().then(()=>{
S.balance+=0.02;
S.fastAds++;
save();
});
}

updateUI();
</script>

</body>
</html>
