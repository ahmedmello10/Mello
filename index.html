<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>
</head>
<body>

<div class="glass-card neon-border" style="text-align: center;">
    <p style="color: var(--text-dim);">رصيدك الحالي</p>
    <h1 id="balance" style="font-size: 40px; margin: 10px 0;">0.00</h1>
    <div style="display: flex; justify-content: space-around; font-size: 12px;">
        <span>إعلانات اليوم: <b id="adsCount">0</b>/10</span>
        <span>إحالات: <b id="refCount">0</b></span>
    </div>
</div>

<div class="mystery-box btn-action" id="luck-box" onclick="tryOpenBox()">
    <span style="font-size: 30px;">🎁</span>
    <h4 id="box-text">صندوق الحظ اليومي</h4>
    <p id="box-sub" style="font-size: 10px; color: var(--neon-purple);">شاهد 3 إعلانات للفتح</p>
</div>

<button class="glass-card btn-action neon-border" style="width: 100%; margin-top: 15px; background: var(--neon-blue); color: #000; font-weight: bold;" onclick="playAd()">
    ▶️ شاهد إعلان واربح $0.10
</button>

<div class="glass-card" id="withdrawal-section">
    <h4>سحب الأرباح (الحد الأدنى $10)</h4>
    <select id="withdraw-method" class="btn-action" style="width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border-radius: 10px;">
        <option value="Binance">Binance Pay ID</option>
        <option value="Trust Wallet">Trust Wallet (USDT-TRC20)</option>
    </select>
    <input type="text" id="wallet-addr" placeholder="العنوان أو الآيدي" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: none;">
    <button class="btn-action" style="width: 100%; background: var(--gold); padding: 12px; border-radius: 10px; border: none;" onclick="processWithdraw()">طلب سحب</button>
</div>

<div class="glass-card">
    <p style="font-size: 12px;">رابط الإحالة الخاص بك (اربح $0.50 لكل صديق):</p>
    <code id="ref-url" style="font-size: 10px; color: var(--neon-blue);"></code>
    <button onclick="copyRef()" class="btn-action" style="display: block; margin-top: 10px; background: none; border: 1px solid var(--text-dim); color: #fff; padding: 5px 10px; border-radius: 5px;">نسخ الرابط</button>
</div>

<div style="height: 80px;"></div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = "6619233998"; 
    const BOT_TOKEN = "8718619320:AAEYA7qmpnSx4rxPdo9RdNesZ0Yzz5GaaIU";

    let S = JSON.parse(localStorage.getItem('user_data')) || {
        balance: 0.00,
        adsToday: 0,
        referrals: 0,
        boxStep: 0
    };

    // نظام الإحالة الواقعي (بيزود فعلاً لو الرابط فيه ID جديد)
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('start') && !localStorage.getItem('referred')) {
        S.balance += 0.50; 
        localStorage.setItem('referred', 'true');
        save();
    }

    function save() {
        localStorage.setItem('user_data', JSON.stringify(S));
        document.getElementById('balance').innerText = S.balance.toFixed(2);
        document.getElementById('adsCount').innerText = S.adsToday;
        document.getElementById('refCount').innerText = S.referrals;
        document.getElementById('ref-url').innerText = `https://t.me/Number433bot?start=${tg.initDataUnsafe.user?.id || 'user'}`;
    }

    // الإعلان التلقائي (كل 5 دقايق وظهور فوري)
    function autoAd() {
        show_10908620().then(() => console.log("Auto Ad Viewed"));
    }
    setInterval(autoAd, 300000); // 5 mins
    autoAd(); // أول دخول

    function playAd() {
        if(S.adsToday >= 10) return alert("خلصت إعلانات النهاردة!");
        show_10908620().then(() => {
            S.balance += 0.10;
            S.adsToday++;
            save();
        });
    }

    function tryOpenBox() {
        if(S.boxStep < 3) {
            show_10908620().then(() => {
                S.boxStep++;
                document.getElementById('box-sub').innerText = `باقي ${3 - S.boxStep} إعلانات`;
                if(S.boxStep === 3) {
                    const prize = 0.50; 
                    S.balance += prize;
                    S.boxStep = 0;
                    alert("مبروك! فتحت الصندوق وكسبت $0.50");
                    save();
                }
            });
        }
    }

    function processWithdraw() {
        const addr = document.getElementById('wallet-addr').value;
        const method = document.getElementById('withdraw-method').value;
        if(S.balance < 10) return alert("لازم تجمع 10$ الأول!");
        if(!addr) return alert("اكتب العنوان!");

        const msg = `💰 *طلب سحب*%0A👤 المستخدم: ${tg.initDataUnsafe.user?.first_name}%0A🆔 الآيدي: ${tg.initDataUnsafe.user?.id}%0A💵 المبلغ: ${S.balance}$%0A🏦 الطريقة: ${method}%0A📍 العنوان: ${addr}`;
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${msg}&parse_mode=Markdown`)
        .then(() => {
            alert("تم إرسال الطلب للمدير!");
            S.balance = 0;
            save();
        });
    }

    save();
</script>
</body>
</html>
