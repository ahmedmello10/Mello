<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number 433 Premium Bot</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10908620' data-sdk='show_10908620'></script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070810;
  --primary: #5c5ff5;
  --primary-glow: rgba(92, 95, 245, 0.4);
  --accent: #c9a84c;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text-dim: #9499c3;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }

body {
  background: var(--bg);
  background-image: radial-gradient(circle at top right, #1a1c3d, #070810);
  color: white; font-family: 'Tajawal', sans-serif;
  min-height: 100vh; padding: 20px 15px 120px;
  direction: rtl;
}

.glass-card {
  background: var(--glass); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); border-radius: 28px;
  padding: 25px 20px; margin-bottom: 20px;
}

.balance-val { font-family: 'Syne', sans-serif; font-size: 45px; font-weight: 800; text-align: center; text-shadow: 0 0 25px var(--primary-glow); }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
.small-stat { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; text-align: center; font-size: 11px; }

/* إشعار سحب وهمي */
.fake-withdraw {
    background: rgba(92, 95, 245, 0.15);
    border: 1px solid var(--primary);
    padding: 10px 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.5s ease;
}

.btn-action {
  background: var(--primary); color: white; border: none; width: 100%;
  padding: 18px; border-radius: 18px; font-weight: 900; font-size: 16px;
  cursor: pointer; box-shadow: 0 8px 20px var(--primary-glow); transition: 0.2s;
}
.btn-action:disabled { background: #2a2d4a; box-shadow: none; opacity: 0.6; cursor: not-allowed; }

.input-style {
  width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
  padding: 16px; border-radius: 15px; color: white; font-family: 'Tajawal'; margin-top: 10px; margin-bottom: 15px;
}

.nav-bar {
  position: fixed; bottom: 20px; left: 15px; right: 15px;
  background: rgba(20, 22, 45, 0.9); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: 25px;
  display: flex; justify-content: space-around; padding: 10px; z-index: 1000;
}
.nav-btn { color: var(--text-dim); background: none; border: none; font-size: 11px; cursor: pointer; flex: 1; transition: 0.3s; }
.nav-btn.active { color: var(--primary); font-weight: 900; transform: translateY(-3px); }

#countdown-timer {
    font-family: 'Syne'; font-size: 20px; color: var(--accent);
    text-align: center; margin: 20px 0; display: none; line-height: 1.5;
}

.page { display: none; }
.page.active { display: block; animation: slideUp 0.4s ease; }

@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

#toast {
    position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
    background: var(--primary); color: white; padding: 12px 25px; border-radius: 15px;
    z-index: 2000; transition: 0.5s; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
#toast.show { top: 30px; }
</style>
</head>
<body>

<div id="toast"></div>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
    <h2 style="font-family:'Syne'; letter-spacing:-1px;">NUM<span style="color:var(--primary)">433</span></h2>
    <div style="background:var(--glass); padding:5px 15px; border-radius:50px; font-size:12px; border:1px solid var(--glass-border);">
        🟢 <span id="u_name">تحميل...</span>
    </div>
</div>

<div id="p-home" class="page active">
    <div id="fake-notify-container"></div>
    <div class="glass-card">
        <p style="text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:10px;">إجمالي الرصيد</p>
        <div class="balance-val">$<span id="balance">0.000</span></div>
        <div class="stat-grid">
            <div class="small-stat">إجمالي الربح: <b id="total_earned">$0.00</b></div>
            <div class="small-stat">المستوى: <b style="color:var(--accent)">VIP 1</b></div>
        </div>
    </div>
    <div class="glass-card">
        <h4>📢 تنبيه الأمان</h4>
        <p style="font-size:12px; color:var(--text-dim); margin-top:8px;">لا تشارك بيانات محفظتك مع أي شخص. نظام السحب مؤمن بالكامل عبر Binance و USDT.</p>
    </div>
</div>

<div id="p-tasks" class="page">
    <h3 style="margin-bottom:15px;">المهام اليومية</h3>
    <div class="glass-card" style="padding:15px; text-align:center;">
        التقدم اليومي: <b id="today_ads">0</b> من <b>10</b>
    </div>
    <div id="countdown-timer"></div>
    <div id="tasks-list"></div>
</div>

<div id="p-refer" class="page">
    <div class="glass-card">
        <h4 style="color:var(--accent)">شارك واربح</h4>
        <div class="stat-grid">
            <div class="small-stat">الإحالات: <b id="ref_count">0</b></div>
            <div class="small-stat">الأرباح: <b id="ref_profit">$0.00</b></div>
        </div>
    </div>
    <div class="glass-card">
        <p style="font-size:12px; color:var(--text-dim); margin-bottom:10px;">رابطك الخاص:</p>
        <div id="ref-link" style="font-size:11px; word-break:break-all; color:var(--primary); background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; margin-bottom:15px;"></div>
        <button class="btn-action" onclick="copyRef()">نسخ الرابط</button>
    </div>
</div>

<div id="p-wallet" class="page">
    <h3 style="margin-bottom:20px;">سحب الأرباح</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <div class="glass-card" onclick="selectPay('Binance Pay')" style="cursor:pointer; text-align:center; padding:15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Binance_Logo.svg" width="30">
            <p style="font-size:12px; margin-top:5px;">Binance</p>
        </div>
        <div class="glass-card" onclick="selectPay('USDT (TRC20)')" style="cursor:pointer; text-align:center; padding:15px;">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="30">
            <p style="font-size:12px; margin-top:5px;">USDT</p>
        </div>
    </div>
    <div id="w-form" class="glass-card" style="display:none;">
        <p id="pay-method" style="color:var(--primary); font-weight:bold; margin-bottom:15px;"></p>
        <input type="text" id="w-addr" class="input-style" placeholder="ID الحساب أو العنوان">
        <input type="number" id="w-amnt" class="input-style" placeholder="المبلغ (الأدنى $10)">
        <button class="btn-action" onclick="submitWithdraw()">إرسال طلب السحب</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showTab('p-home', this)">🏠<br>الرئيسية</button>
    <button class="nav-btn" onclick="showTab('p-tasks', this)">🎯<br>المهام</button>
    <button class="nav-btn" onclick="showTab('p-refer', this)">👥<br>الدعوات</button>
    <button class="nav-btn" onclick="showTab('p-wallet', this)">💰<br>المحفظة</button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// تكوين إعلانات التنقل التلقائية
show_10908620({
  type: 'inApp',
  inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false }
});

let S = JSON.parse(localStorage.getItem('n433_v2')) || {
    balance: 0.000,
    adsToday: 0,
    totalEarned: 0.00,
    refCount: 0,
    refProfit: 0.00,
    lastResetTimestamp: 0
};

function save() {
    localStorage.setItem('n433_v2', JSON.stringify(S));
    updateUI();
}

function updateUI() {
    document.getElementById('balance').innerText = S.balance.toFixed(3);
    document.getElementById('total_earned').innerText = "$" + S.totalEarned.toFixed(2);
    document.getElementById('today_ads').innerText = S.adsToday;
    document.getElementById('ref_count').innerText = S.refCount;
    document.getElementById('ref_profit').innerText = "$" + S.refProfit.toFixed(2);

    const tasksList = document.getElementById('tasks-list');
    const timerDisplay = document.getElementById('countdown-timer');

    if (S.adsToday >= 10) {
        tasksList.style.display = 'none';
        timerDisplay.style.display = 'block';
        startTimer();
    } else {
        tasksList.style.display = 'block';
        timerDisplay.style.display = 'none';
        renderTasks();
    }
}

// مؤقت 24 ساعة
function startTimer() {
    const interval = setInterval(() => {
        const now = Date.now();
        const distance = (24 * 60 * 60 * 1000) - (now - S.lastResetTimestamp);
        
        if (distance <= 0) {
            clearInterval(interval);
            S.adsToday = 0;
            S.lastResetTimestamp = 0;
            save();
            return;
        }

        const h = Math.floor(distance / 3600000);
        const m = Math.floor((distance % 3600000) / 60000);
        const s = Math.floor((distance % 60000) / 1000);
        document.getElementById('countdown-timer').innerHTML = `عد بعد:<br>${h}س : ${m}د : ${s}ث`;
    }, 1000);
}

function renderTasks() {
    let html = '';
    for(let i = S.adsToday + 1; i <= 10; i++) {
        html += `
        <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px; margin-bottom:10px;">
            <div><b>مهمة #${i}</b><br><small style="color:var(--primary)">ربح +$0.050</small></div>
            <button class="btn-action" style="width:auto; padding:8px 18px; font-size:12px;" onclick="completeTask(this)">مشاهدة</button>
        </div>`;
    }
    document.getElementById('tasks-list').innerHTML = html;
}

// وظيفة الإعلانات الحقيقية
function completeTask(btn) {
    btn.disabled = true;
    btn.innerText = "جاري...";
    
    // تشغيل إعلان SDK الحقيقي
    show_10908620().then(() => {
        S.balance += 0.050;
        S.totalEarned += 0.050;
        S.adsToday += 1;
        if(S.adsToday >= 10) S.lastResetTimestamp = Date.now();
        save();
        showToast("💰 مبروك! ربحت $0.050");
    }).catch(() => {
        btn.disabled = false;
        btn.innerText = "فشل! أعد المحاولة";
        showToast("⚠️ يجب مشاهدة الإعلان للنهاية");
    });
}

// إشعارات وهمية
const fakeNames = ["عمر", "ريم", "خالد", "ليان", "نور", "Saad", "Huda", "Fahad"];
function showFakeWithdraw() {
    const name = fakeNames[Math.floor(Math.random() * fakeNames.length)];
    const amnt = [10, 15, 20, 50, 100][Math.floor(Math.random() * 5)];
    const container = document.getElementById('fake-notify-container');
    container.innerHTML = `<div class="fake-withdraw">✅ <b>${name}</b> سحب للتو <b>$${amnt}.00</b> بنجاح!</div>`;
    setTimeout(() => container.innerHTML = '', 4000);
}
setInterval(showFakeWithdraw, 8000);

function showTab(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function selectPay(m) {
    document.getElementById('w-form').style.display = 'block';
    document.getElementById('pay-method').innerText = "السحب عبر: " + m;
}

function copyRef() {
    navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
    showToast("🔗 تم النسخ!");
}

const user = tg.initDataUnsafe?.user;
document.getElementById('u_name').innerText = user?.first_name || "Guest";
document.getElementById('ref-link').innerText = `https://t.me/Number433bot?start=${user?.id || '6619233998'}`;

if (S.adsToday >= 10 && S.lastResetTimestamp !== 0) {
    const passed = Date.now() - S.lastResetTimestamp;
    if (passed >= 86400000) { S.adsToday = 0; S.lastResetTimestamp = 0; save(); }
}

updateUI();
</script>
</body>
</html>
